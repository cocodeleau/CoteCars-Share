                  <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
                    <div style={{ width:42, height:42, borderRadius:11, background:"#1B3FDB", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                      <svg width="19" height="19" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>

                    </div>
                    <button onClick={() => setShowPartenaireModal(false)} style={{ width:32, height:32, borderRadius:"50%", background:"var(--bg)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, color:"var(--text2)", flexShrink:0 }}>✕</button>
                  </div>

                    <a href="/partner.html" style={{ display:"flex", flexDirection:"column", gap:10, padding:"20px 18px", borderRadius:18, border:"1.5px solid var(--border)", textDecoration:"none", background:"var(--card)", transition:"all .15s", alignItems:"center", textAlign:"center" }} onMouseOver={e=>{e.currentTarget.style.borderColor="#8dc63f";e.currentTarget.style.background="#f0fdf4"}} onMouseOut={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--card)"}}>
                      <div style={{ width:44, height:44, borderRadius:12, background:"#1a1a2e", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:900, color:"#8dc63f" }}>AE</div>

                        <div style={{ fontSize:12, color:"var(--text2)", lineHeight:1.5 }}>Traitement photo pro, fond studio IA, bandeau AUTOEASY.</div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, fontWeight:600, color:"#8dc63f" }}>Accéder →</div>
                    </a>

                        <svg width="20" height="20" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M5 17h-2v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2m-4 0h-6m-6-6h15m-6 0v-5"/></svg>
                      </div>
                      <div>
                        <div style={{ fontSize:15, fontWeight:700, color:"var(--text)", marginBottom:4 }}>CoteCars Pro</div>
                        <div style={{ fontSize:12, color:"var(--text2)", lineHeight:1.5 }}>Espace dédié aux professionnels CoteCars.</div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, fontWeight:600, color:"#1B3FDB" }}>Accéder →</div>

                  </div>

                <div style={{ fontSize:15, fontWeight:700, color:"var(--text)" }}>Cote<span style={{color:"#1B3FDB"}}>Cars</span></div>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <DarkToggle />
                </div>
              </header>

              {/* Contenu scrollable */}
              <div style={{ flex:1, overflowY:"auto", overflowX:"hidden", background:"var(--bg)" }}>

                {/* HERO */}

                  <div style={{ position:"absolute", bottom:-40, left:-20, width:160, height:160, borderRadius:"50%", background:"rgba(255,255,255,0.04)" }} />
                  <div style={{ position:"relative", zIndex:1, display:"flex", flexDirection:"column", alignItems:"center" }}>

                      <span style={{ fontSize:11, color:"rgba(255,255,255,0.85)", fontWeight:600 }}>{(()=>{ const d=new Date(); const seed=(d.getFullYear()*366+d.getMonth()*31+d.getDate())*9301+49297; const base=1800+((seed%17))*35+(d.getDate()*12); return `+${base.toLocaleString("fr-FR")} analyses ce mois-ci`; })()}</span>
                    </div>
                    <h1 style={{ color:"white", fontSize:30, fontWeight:800, lineHeight:1.2, margin:"0 0 10px", letterSpacing:"-0.5px" }}>Connaissez le vrai prix<br/>de votre voiture</h1>

                  </div>
                </div>

                            style={{ flex:1, padding:"0 12px", fontSize:15, fontWeight:600, border:"none", outline:"none", background:"transparent", color:"var(--text)" }} inputMode="numeric" />
                          <span style={{ padding:"0 12px", color:"var(--text3)", fontWeight:600, fontSize:13 }}>km</span>
