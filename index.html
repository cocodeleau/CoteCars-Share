                <div>
                  <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Kilométrage</label>
                  <input value={km} onChange={e=>setKm(e.target.value)} placeholder="Ex: 120000" type="number"
                    style={{ width:"100%", padding:"10px 12px", border:"2px solid #e5e7eb", borderRadius:10, fontSize:13, boxSizing:"border-box", outline:"none" }} />
                </div>
              </div>

              <button onClick={handleSubmit} disabled={!isValid||sending}
                style={{ width:"100%", background:!isValid?"#d1d5db":"linear-gradient(135deg,#1a3fdb,#0f28a8)", color:"white", fontWeight:800, fontSize:15, borderRadius:12, padding:"13px 0", border:"none", cursor:!isValid?"not-allowed":"pointer", marginBottom:8 }}>
                {sending ? "Envoi en cours..." : "📩 Envoyer ma demande"}
              </button>
              <button onClick={onReset} style={{ width:"100%", background:"#f3f4f6", color:"#6b7280", fontWeight:700, fontSize:13, borderRadius:12, padding:"11px 0", border:"none", cursor:"pointer" }}>
                🔄 Réessayer avec une autre plaque
              </button>
              <p style={{ fontSize:11, color:"#9ca3af", textAlign:"center", margin:"10px 0 0" }}>* Champs obligatoires</p>
            </div>
          ) : (
            <div style={{ width:"100%", background:"var(--card)", borderRadius:20, padding:"24px", boxShadow:"0 4px 16px rgba(0,0,0,0.08)", textAlign:"center", animation:"fadeIn 0.4s ease", border:"0.5px solid var(--border)" }}>
              <div style={{ fontSize:56, marginBottom:12 }}>✅</div>
              <h3 style={{ fontWeight:800, fontSize:18, color:"var(--text)", margin:"0 0 8px" }}>Demande envoyée !</h3>
              <p style={{ color:"#6b7280", fontSize:14, margin:"0 0 20px" }}>Nous reviendrons vers vous rapidement avec votre estimation gratuite.</p>
              <button onClick={onReset} style={{ width:"100%", background:"linear-gradient(135deg,#1a3fdb,#0f28a8)", color:"white", fontWeight:800, fontSize:16, borderRadius:14, padding:"14px 0", border:"none", cursor:"pointer" }}>
                🔄 Nouvelle recherche
              </button>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [showLoginModal, setShowLoginModal] = useState(false);

      React.useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => setUser(u || null));
        return unsub;
      }, []);

      const [state, setState] = useState("home");
      const [showAnnonces, setShowAnnonces] = React.useState(false);
      const [showCreateAnnonce, setShowCreateAnnonce] = React.useState(false);
      const [showPrepareLbc, setShowPrepareLbc] = React.useState(false);
      const [showMobileMenu, setShowMobileMenu] = React.useState(false);
      const [gearbox, setGearbox] = useState("");
      const [showPuissanceConfirm, setShowPuissanceConfirm] = React.useState(false);
      const [puissanceConfirmValue, setPuissanceConfirmValue] = React.useState("");
      const [pendingResult, setPendingResult] = React.useState(null);
      const [showEnergieConfirm, setShowEnergieConfirm] = React.useState(false);
      const [plate, setPlate] = useState("");
      const [km, setKm] = useState("");
      const [finition, setFinition] = useState("");
      const [finitionsList, setFinitionsList] = useState([]);
      const [vehicleInfo, setVehicleInfo] = useState(null);
      const [loadingFin, setLoadingFin] = useState(false);
      const [finLoaded, setFinLoaded] = useState(false);
      const [err, setErr] = useState("");
      const [apiErr, setApiErr] = useState("");
      const [result, setResult] = useState(null);
      const [historique, setHistorique] = useState([]);

      // Charger historique depuis Firestore
      React.useEffect(() => {
        if (!user) return;
        db.collection("historique").doc(user?.uid).get().then(doc => {
          if (doc.exists) setHistorique(doc.data().items || []);
        }).catch(() => {});
      }, [user]);

      function handlePlateChange(val) {
        setPlate(val);
        setFinition("");
        setFinitionsList([]);
        setVehicleInfo(null);
        setFinLoaded(false);
        // Longueur sans tirets pour déclencher le chargement
        const valClean = val.replace(/-/g, "");
        if (valClean.length >= 7) {
          setTimeout(() => loadFinitions(val), 100);
        }
      }

      async function loadFinitions(p) {
        if (!p || p.length < 7) return;
        setLoadingFin(true);
        try {
          const pClean = p.replace(/-/g, "");
          const sivRes = await fetch(`/api/rapid-api-requests?plaque=${pClean}`);
          if (!sivRes.ok) return;
          const sivData = await sivRes.json();
          const veh = sivData.data || sivData.données || {};
          const marque = veh.AWN_marque || "";
          const modeleRaw = (veh.AWN_nom_commercial || veh.AWN_modele || "").replace(/_/g, " ");
          const fins = getFinitions(marque, modeleRaw);
          setFinitionsList(fins);
          setVehicleInfo({ marque, modele: modeleRaw });
          setFinition("");
        } catch(e) {}
        setFinLoaded(true);
        setLoadingFin(false);
      }


      async function handleAnalyze() {
        if (plate.length < 7) { setErr("Veuillez saisir une plaque valide (ex: AB-123-CD)"); return; }
        if (!gearbox) { setErr("Veuillez sélectionner le type de boîte de vitesse."); return; }
        setErr(""); setState("loading"); if(window.posthog) posthog.capture('recherche_lancee', {plaque, km, gearbox, finition});
        try {
          const plateClean = plate.replace(/-/g, "");
          const sivRes = await fetch(`/api/rapid-api-requests?plaque=${plateClean}`);
          if (!sivRes.ok) throw new Error(`Plaque introuvable (${sivRes.status})`);
          const sivData = await sivRes.json();
          const veh = sivData.data || sivData.données || {};
          const marque = veh.AWN_marque || "";
          const modele = (veh.AWN_nom_commercial || veh.AWN_modele || "").replace(/_/g, " ");
          const nom = [marque, veh.AWN_modele, veh.AWN_date_mise_en_circulation?.slice(6)].filter(Boolean).join(" ");
          if (!marque || !modele) throw new Error("Véhicule non identifié.");

          const kmUser = km ? parseInt(km) : null;
          const anneeUser = veh.AWN_date_mise_en_circulation ? parseInt(veh.AWN_date_mise_en_circulation.slice(-4)) : null;
          const chUser = veh.AWN_puissance_CH || null;
          const energieRaw = veh.AWN_energie || "";
          const FUEL_CODES = {
            "ESSENCE": "1",
            "GAZOLE": "2",
            "GPL": "3",
            "ELECTRIQUE": "4",
            "AUTRE": "5",
            "HYBRIDE": "6",
            "HYBRIDE ESSENCE ELECTRIQUE": "6",
            "HYBRIDE RECHARGEABLE": "6",
            "HYBRIDE DIESEL ELECTRIQUE": "6",
            "GAZ NATUREL (GNV)": "5",
            "HYDROGENE": "5",
          };
          const fuelCode = FUEL_CODES[energieRaw.toUpperCase()] || (energieRaw.includes("HYBRIDE") ? "6" : energieRaw.includes("ELECTR") ? "4" : energieRaw.includes("GPL") ? "3" : "");

          const lbcParams = new URLSearchParams({ marque, modele });
          if (kmUser)    lbcParams.set("km", kmUser);
          if (anneeUser) lbcParams.set("annee", anneeUser);
          if (chUser)    lbcParams.set("ch", chUser);
          if (fuelCode)  lbcParams.set("fuel", fuelCode);
          lbcParams.set("gearbox", gearbox);
          if (finition) lbcParams.set("finition", finition);
          const lbcRes = await fetch(`/api/leboncoin?${lbcParams.toString()}`);
          if (!lbcRes.ok) throw new Error(`Erreur marché (${lbcRes.status})`);
          const lbcData = await lbcRes.json();
          const rawAds = lbcData.ads || [];
          const ads = filterAds(rawAds, kmUser, anneeUser, chUser, marque, modele, finition);
          const stats = computeStats(ads);
          const peuResultats = finition && ads.length < 5;

          const finitionsList2 = getFinitions(marque, modele);
          // Sauvegarder dans Firestore
          const entry = { plate, nom, finition, stats, date: new Date().toLocaleDateString('fr-FR'), km: kmUser };
          const newHisto = [entry, ...historique.filter(h => h.plate !== plate)].slice(0, 10);
          setHistorique(newHisto);
          if (user) {
            db.collection("historique").doc(user?.uid).set({ items: newHisto }).catch(() => {});
          }

          let resultData = { veh, nom, ads, stats, finition, peuResultats, marque, modele, kmUser, anneeUser, chUser, fuelCode, gearbox, finitionsList: finitionsList2 };
          if (veh.AWN_energie_SUSPECT) {
            setPendingResult(resultData);
            setShowEnergieConfirm(true);
            setState("home");
          } else if (veh.AWN_puissance_SUSPECT) {
            setPendingResult(resultData);
            setPuissanceConfirmValue("");
            setShowPuissanceConfirm(true);
            setState("home");
          } else {
            setResult(resultData);
            setState("results");
          } if(window.posthog) posthog.capture('vehicule_identifie', {marque, modele, finition, km: kmUser});
        } catch(e) {
          setApiErr(e.message || "Une erreur est survenue.");
          setState("error"); if(window.posthog) posthog.capture('recherche_erreur', {plaque, erreur: e.message});
        }
      }

      async function handleElargi(finitionSimilaire) {
        // Relancer avec finition similaire ou sans finition
        setState("loading");
        try {
          const veh = result.veh;
          const marque = result.marque;
          const modele = result.modele;
          const nom = result.nom;
          const lbcParams = new URLSearchParams({ marque, modele });
          if (result.kmUser)    lbcParams.set("km", result.kmUser);
          if (result.anneeUser) lbcParams.set("annee", result.anneeUser);
          if (result.chUser)    lbcParams.set("ch", result.chUser);
          if (result.fuelCode)  lbcParams.set("fuel", result.fuelCode);
          if (result.gearbox) lbcParams.set("gearbox", result.gearbox);
          const lbcRes = await fetch(`/api/leboncoin?${lbcParams.toString()}`);
          if (!lbcRes.ok) throw new Error("Erreur marché");
          const lbcData = await lbcRes.json();
          const rawAds = lbcData.ads || [];
          const kmUser = result.kmUser;
          const anneeUser = result.anneeUser;
          const chUser = result.chUser;
          const ads = filterAds(rawAds, kmUser, anneeUser, chUser, marque, modele, finition);
          const stats = computeStats(ads);
          setResult({ ...result, ads, stats, finition: finitionSimilaire || "", peuResultats: false });
          setState("results");
        } catch(e) {
          setApiErr(e.message);
          setState("error");
        }
      }

      function handleReset() {
        setState("home"); setPlate(""); setKm(""); setGearbox("");
        setFinition(""); setFinitionsList([]); setVehicleInfo(null); setFinLoaded(false);
        setErr(""); setApiErr(""); setResult(null);
      }

      function clearHistorique() {
        setHistorique([]);
        if (user) db.collection("historique").doc(user?.uid).delete().catch(() => {});
      }

      if (showAnnonces) return <AnnoncesPage onBack={() => setShowAnnonces(false)} user={user} />;
      if (state === "loading") return <>{showLoginModal && <LoginModal onClose={() => setShowLoginModal(false)} />}<Spinner /></>;
      if (state === "results") return <>{showLoginModal && <LoginModal onClose={() => setShowLoginModal(false)} />}{showCreateAnnonce && <CreateAnnonce result={result} plate={plate} user={user} onClose={() => setShowCreateAnnonce(false)} onPublished={() => {}} />}{showPrepareLbc && <PrepareAnnonceLbc result={result} plate={plate} user={user} km={km} onClose={() => setShowPrepareLbc(false)} />}<Results result={result} plate={plate} onReset={handleReset} user={user} onElargi={handleElargi} setShowLoginModal={setShowLoginModal} onCreateAnnonce={() => setShowCreateAnnonce(true)} onPrepareLbc={() => setShowPrepareLbc(true)} /></>;
      if (state === "error") return (
        <ErrorPage apiErr={apiErr} plaque={plate} onReset={handleReset} />
      );

      const BLUE = "#1a3fdb";
      const BLUE_DARK = "#0f28a8";

      return (
        <div style={{ fontFamily:"'DM Sans',-apple-system,sans-serif", background:"var(--bg)", minHeight:"100vh", transition:"background 0.2s" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
            @keyframes floatorb{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
            @keyframes pulseGreen{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
            .cc-mobile{display:flex;flex-direction:column;background:var(--bg);}
            .cc-desktop{display:none;}
            @media(min-width:900px){.cc-mobile{display:none!important;}.cc-desktop{display:block!important;}body{overflow-x:auto;}}
          `}</style>
          {showLoginModal && <LoginModal onClose={() => setShowLoginModal(false)} />}
          {showPuissanceConfirm && pendingResult && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:"white",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:360,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
                <p style={{fontWeight:800,fontSize:17,color:"#111",margin:"0 0 10px"}}>⚠️ Puissance à confirmer</p>
                <p style={{fontSize:13,color:"#6b7280",margin:"0 0 16px",lineHeight:1.5}}>
                  La puissance détectée ({pendingResult.veh.AWN_puissance_CH} ch) semble incorrecte pour ce véhicule.<br/>Veuillez saisir la vraie puissance en chevaux DIN.
                </p>
                <input type="number" value={puissanceConfirmValue} onChange={e=>setPuissanceConfirmValue(e.target.value)}
                  placeholder="Ex: 75" style={{width:"100%",padding:"13px 14px",border:"2px solid #e5e7eb",borderRadius:12,fontSize:18,fontWeight:700,marginBottom:14,boxSizing:"border-box",outline:"none"}}/>
                <button onClick={async ()=>{
                  const ch = parseInt(puissanceConfirmValue);
                  if (!ch || ch < 30 || ch > 1000) return;
                  setShowPuissanceConfirm(false); setPendingResult(null); setState("loading");
                  try {
                    const r = {...pendingResult}; r.veh.AWN_puissance_CH = ch; r.chUser = ch;
                    const lbcParams = new URLSearchParams({ marque: r.marque, modele: r.modele });
                    if (r.kmUser) lbcParams.set("km", r.kmUser);
                    if (r.anneeUser) lbcParams.set("annee", r.anneeUser);
                    lbcParams.set("ch", ch);
                    if (r.fuelCode) lbcParams.set("fuel", r.fuelCode);
                    lbcParams.set("gearbox", r.gearbox);
                    if (r.finition) lbcParams.set("finition", r.finition);
                    const lbcRes = await fetch(`/api/leboncoin?${lbcParams.toString()}`);
                    const lbcData = await lbcRes.json();
                    const rawAds = lbcData.ads || [];
                    const ads = filterAds(rawAds, r.kmUser, r.anneeUser, ch, r.marque, r.modele, r.finition);
                    const stats = computeStats(ads);
                    r.ads = ads; r.stats = stats;
                    r.peuResultats = r.finition && ads.length < 5;
                    setResult(r); setState("results");
                  } catch(e) { setState("results"); }
                }} disabled={!puissanceConfirmValue}
                  style={{width:"100%",background:!puissanceConfirmValue?"#d1d5db":BLUE,color:"white",fontWeight:800,fontSize:16,borderRadius:14,padding:"14px 0",border:"none",cursor:!puissanceConfirmValue?"not-allowed":"pointer",marginBottom:10}}>
                  ✅ Confirmer
                </button>
                <button onClick={()=>{ setResult(pendingResult); setShowPuissanceConfirm(false); setPendingResult(null); setState("results"); }}
                  style={{width:"100%",background:"#f3f4f6",color:"#6b7280",fontWeight:700,fontSize:14,borderRadius:14,padding:"12px 0",border:"none",cursor:"pointer"}}>
                  Ignorer et continuer
                </button>
              </div>
            </div>
          )}
          {showEnergieConfirm && pendingResult && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:"white",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:380,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
                <p style={{fontWeight:800,fontSize:17,color:"#111",margin:"0 0 6px"}}>⛽ Type de carburant à confirmer</p>
                <p style={{fontSize:13,color:"#6b7280",margin:"0 0 20px",lineHeight:1.6}}>
                  Nos sources retournent deux informations contradictoires pour ce véhicule. Quelle est la vraie motorisation ?
                </p>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
                  {(pendingResult.veh.AWN_energie_SUSPECT_valeurs || []).map(val => {
                    const labels = { GAZOLE:"⛽ Diesel", ESSENCE:"🔥 Essence", ELECTRIQUE:"⚡ Électrique", HYBRIDE:"🌿 Hybride", GPL:"🟡 GPL" };
                    return (
                      <button key={val} onClick={async ()=>{
                        const FUEL_CODES = {"ESSENCE":"1","GAZOLE":"2","GPL":"3","ELECTRIQUE":"4","HYBRIDE":"6"};
                        const chosenFuelCode = FUEL_CODES[val] || "";
                        setShowEnergieConfirm(false); setPendingResult(null); setState("loading");
                        try {
                          const r = {...pendingResult, veh: {...pendingResult.veh}};
                          r.veh.AWN_energie = val;
                          r.fuelCode = chosenFuelCode;
                          // Utiliser chUser du pendingResult
                          const chFinal = r.chUser || r.veh.AWN_puissance_CH;
                          const anneeFinal = r.anneeUser || (r.veh.AWN_date_mise_en_circulation ? parseInt(r.veh.AWN_date_mise_en_circulation.slice(-4)) : null);
                          // Relancer Leboncoin avec le bon carburant choisi
                          const lbcParams = new URLSearchParams({ marque: r.marque, modele: r.modele });
                          if (r.kmUser)        lbcParams.set("km", r.kmUser);
                          if (anneeFinal)      lbcParams.set("annee", anneeFinal);
                          if (chFinal)         lbcParams.set("ch", chFinal);
                          if (chosenFuelCode)  lbcParams.set("fuel", chosenFuelCode);
                          if (r.gearbox)       lbcParams.set("gearbox", r.gearbox);
                          if (r.finition)      lbcParams.set("finition", r.finition);
                          const lbcRes = await fetch(`/api/leboncoin?${lbcParams.toString()}`);
                          const lbcData = await lbcRes.json();
                          const rawAds = lbcData.ads || [];
                          r.ads = filterAds(rawAds, r.kmUser, anneeFinal, chFinal, r.marque, r.modele, r.finition);
                          r.stats = computeStats(r.ads);
                          r.peuResultats = r.finition && r.ads.length < 5;
                          r.chUser = chFinal; r.anneeUser = anneeFinal;
                          setResult(r); setState("results");
                        } catch(e) { setState("error"); setApiErr(e.message); }
                      }}
                        style={{width:"100%",padding:"14px 0",borderRadius:14,border:"2px solid #e5e7eb",background:"white",color:"#111",fontWeight:700,fontSize:15,cursor:"pointer",transition:"border-color 0.15s"}}
                        onMouseEnter={e=>e.currentTarget.style.borderColor="#1a3fdb"}
                        onMouseLeave={e=>e.currentTarget.style.borderColor="#e5e7eb"}>
                        {labels[val] || val}
                      </button>
                    );
                  })}
                </div>
                <div style={{borderTop:"1px solid #f3f4f6",paddingTop:16,textAlign:"center"}}>
                  <p style={{fontSize:12,color:"#9ca3af",margin:"0 0 8px"}}>Aucune des deux options ne correspond ?</p>
                  <button onClick={()=>{
                    setShowEnergieConfirm(false); setPendingResult(null);
                    setApiErr("Données carburant incohérentes pour cette plaque. Merci de nous signaler le problème.");
                    setState("error");
                  }}
                    style={{background:"none",border:"none",color:"#1a3fdb",fontSize:13,fontWeight:600,cursor:"pointer",textDecoration:"underline"}}>
                    📩 Signaler une erreur
                  </button>
                </div>
              </div>
            </div>
          )}
          {/* ═══ MOBILE ═══ */}
          <div className="cc-mobile" style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh" }}>

            {/* ── NAVBAR MOBILE ── */}
            <div style={{ background:"var(--nav-bg)", borderBottom:"0.5px solid var(--border)", padding:"0 16px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:20 }}>
              <span style={{ fontWeight:800, fontSize:24, color:"var(--text)", letterSpacing:"-0.5px" }}>Cote<span style={{color:"#1a3fdb"}}>Cars</span></span>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <DarkToggle />
                <button onClick={() => setShowMobileMenu(m => !m)}
                  style={{ display:"flex", flexDirection:"column", justifyContent:"center", gap:5, width:36, height:36, background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, cursor:"pointer", padding:"0 8px" }}>
                  <div style={{ height:2, background:"var(--text)", borderRadius:2 }} />
                  <div style={{ height:2, background:"var(--text)", borderRadius:2 }} />
                  <div style={{ height:2, background:"var(--text)", borderRadius:2 }} />
                </button>
              </div>
            </div>

            {/* ── MENU HAMBURGER ── */}
            {showMobileMenu && (
              <div style={{ position:"fixed", inset:0, zIndex:100 }} onClick={() => setShowMobileMenu(false)}>
                <div style={{ position:"absolute", top:56, left:0, right:0, background:"var(--card)", borderBottom:"1px solid var(--border)", boxShadow:"0 8px 24px rgba(0,0,0,0.12)", padding:"8px 0" }}
                  onClick={e => e.stopPropagation()}>
                  <button onClick={() => { setShowAnnonces(true); setShowMobileMenu(false); }}
                    style={{ width:"100%", display:"flex", alignItems:"center", gap:14, padding:"14px 20px", background:"none", border:"none", cursor:"pointer", textAlign:"left", borderBottom:"0.5px solid var(--border)" }}>
                    <span style={{ fontSize:20 }}>🏷️</span>
                    <div>
                      <p style={{ margin:0, fontSize:14, fontWeight:700, color:"var(--text)" }}>Nos annonces</p>
                      <p style={{ margin:0, fontSize:11, color:"var(--text3)" }}>Voir les voitures disponibles</p>
                    </div>
                  </button>
                  <a href="/partner.html" style={{ width:"100%", display:"flex", alignItems:"center", gap:14, padding:"14px 20px", textDecoration:"none", borderBottom:"0.5px solid var(--border)" }}>
                    <div style={{ width:32, height:32, borderRadius:"50%", flexShrink:0, backgroundImage:'url("https://cotecars-test.vercel.app/vignette-AE.png")', backgroundSize:"cover", backgroundPosition:"center" }} />
                    <div><p style={{ margin:0, fontSize:14, fontWeight:700, color:"#8dc63f" }}>AutoEasy</p></div>
                  </a>
                  <a href="/partner-esdfx.html" style={{ width:"100%", display:"flex", alignItems:"center", gap:14, padding:"14px 20px", textDecoration:"none", borderBottom:"0.5px solid var(--border)" }}>
                    <div style={{ width:32, height:32, borderRadius:"50%", flexShrink:0, backgroundImage:'url("https://cotecars-test.vercel.app/favicon.png")', backgroundSize:"cover", backgroundPosition:"center" }} />
                    <div><p style={{ margin:0, fontSize:14, fontWeight:700, color:"#60a5fa" }}>CoteCars</p></div>
                  </a>
                  {user ? (
                    <button onClick={() => { auth.signOut(); setShowMobileMenu(false); }}

                  <p style={{ margin:0, fontSize:12, color:"#3b5bdb", lineHeight:1.5 }}>On ne stocke ni votre plaque, ni vos informations personnelles.</p>
                </div>
                <div style={{ textAlign:"center", paddingTop:8, borderTop:"1px solid #e8edf5" }}>
                  <p style={{ fontSize:11, color:"#c0cce0", margin:0 }}>© 2025 CoteCars · <a href="/mentions-legales.html" style={{color:"#c0cce0"}}>Mentions légales</a> · <a href="/cgu.html" style={{color:"#c0cce0"}}>CGU</a></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // On attend que Firebase soit prêt avant de monter l'app React
    window.__firebaseReady.then(() => {
      auth           = window.__firebase.auth;
      db             = window.__firebase.db;
      storage        = window.__firebase.storage;
      googleProvider = window.__firebase.googleProvider;
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    });
  </script>
</body>
