  <!-- Firebase initialisé de manière asynchrone depuis /api/firebase-config -->
  <!-- Aucune clé n'est exposée dans ce fichier HTML -->
  <script>
    window.__firebaseReady = fetch("/api/firebase-config")
      .then(r => r.json())
      .then(cfg => {
        firebase.initializeApp(cfg);
        window.__firebase = {
          auth:           firebase.auth(),
          db:             firebase.firestore(),
          storage:        firebase.storage(),
          googleProvider: new firebase.auth.GoogleAuthProvider(),
        };
      })
      .catch(err => {
        console.error("[Firebase] Impossible de charger la config :", err);
        document.getElementById("root").innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#ef4444">Erreur de chargement. Veuillez réessayer.</div>';
      });
  </script>

  <script type="text/babel">
    const { useState } = React;

    // Firebase — disponible via window.__firebase après initialisation asynchrone
    // Les variables auth/db/storage sont extraites après le chargement
    let auth, db, storage, googleProvider;

    // Dark mode
    function initTheme() {
      const saved = localStorage.getItem('cotecars-theme');
      if (saved === 'dark') document.body.classList.add('dark');
    }
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('cotecars-theme', isDark ? 'dark' : 'light');
    }
    initTheme();


    const EMERALD = "#1a3fdb";


    function useIsMobile(breakpoint) {
      var bp = breakpoint || 768;
      const [isMobile, setIsMobile] = React.useState(window.innerWidth < bp);
      React.useEffect(function() {
        const handler = function() { setIsMobile(window.innerWidth < bp); };
        window.addEventListener("resize", handler);
        return function() { window.removeEventListener("resize", handler); };
      }, []);
      return isMobile;
    }

    function LoginModal({ onClose }) {
      const [mode, setMode] = React.useState("login"); // login | register | forgot
      const [email, setEmail] = React.useState("");
      const [password, setPassword] = React.useState("");
      const [confirmPassword, setConfirmPassword] = React.useState("");
      const [showPassword, setShowPassword] = React.useState(false);
      const [error, setError] = React.useState("");
      const [success, setSuccess] = React.useState("");
      const [loading, setLoading] = React.useState(false);

      async function handleEmailAuth(e) {
        e.preventDefault();
        setError(""); setSuccess("");
        if (mode === "register" && password !== confirmPassword) { setError("Les mots de passe ne correspondent pas."); return; }
        if (password.length < 6) { setError("Le mot de passe doit contenir au moins 6 caractères."); return; }
        setLoading(true);
        try {
          if (mode === "login") {
            await auth.signInWithEmailAndPassword(email, password);
            if(window.posthog) posthog.capture("connexion_email");
          } else {
            await auth.createUserWithEmailAndPassword(email, password);
            if(window.posthog) posthog.capture("inscription_email");
          }
          if (onClose) onClose();
        } catch(err) {
          const msgs = {
            "auth/user-not-found": "Aucun compte avec cet email.",
            "auth/wrong-password": "Mot de passe incorrect.",
            "auth/email-already-in-use": "Cet email est déjà utilisé.",
            "auth/invalid-email": "Email invalide.",
            "auth/too-many-requests": "Trop de tentatives. Réessayez plus tard.",
          };
          setError(msgs[err.code] || "Une erreur est survenue.");
        }
        setLoading(false);
      }

      async function handleForgot(e) {
        e.preventDefault();
        setError(""); setSuccess("");
        if (!email) { setError("Entrez votre email."); return; }
        setLoading(true);
        try {
          await auth.sendPasswordResetEmail(email);
          setSuccess("Email de réinitialisation envoyé !");
        } catch(err) {
          setError("Email introuvable.");
        }
        setLoading(false);
      }

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}
          onClick={e => { if(e.target === e.currentTarget && onClose) onClose(); }}>
          <div style={{ background:"var(--card)", borderRadius:24, padding:"32px 28px", width:"100%", maxWidth:380, boxShadow:"0 24px 64px rgba(0,0,0,0.18)", border:"0.5px solid var(--border)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <span style={{ fontWeight:800, fontSize:18, color:"var(--text)" }}>
                {mode === "login" ? "Connexion" : mode === "register" ? "Créer un compte" : "Mot de passe oublié"}
              </span>
              {onClose && <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#9ca3af" }}>✕</button>}
            </div>

            <button onClick={() => auth.signInWithPopup(googleProvider).then(() => { if(onClose) onClose(); if(window.posthog) posthog.capture("connexion_google"); })}
              style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:10, padding:"12px", background:"white", border:"2px solid #e5e7eb", borderRadius:12, cursor:"pointer", fontSize:14, fontWeight:700, color:"#111", marginBottom:16 }}>
              <img src="https://www.google.com/favicon.ico" width={18} height={18} alt="" />
              Continuer avec Google
            </button>

            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
              <div style={{ flex:1, height:1, background:"#e5e7eb" }} />
              <span style={{ fontSize:12, color:"#9ca3af" }}>ou</span>
              <div style={{ flex:1, height:1, background:"#e5e7eb" }} />
            </div>

            <form onSubmit={mode === "forgot" ? handleForgot : handleEmailAuth}>
              <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required
                style={{ width:"100%", padding:"12px 14px", border:"2px solid var(--border)", borderRadius:12, fontSize:14, marginBottom:10, outline:"none", boxSizing:"border-box", background:"var(--input-bg)", color:"var(--text)" }} />
              {mode !== "forgot" && (
                <div style={{ position:"relative", marginBottom:10 }}>
                  <input type={showPassword ? "text" : "password"} placeholder="Mot de passe" value={password} onChange={e => setPassword(e.target.value)} required
                    style={{ width:"100%", padding:"12px 44px 12px 14px", border:"2px solid var(--border)", borderRadius:12, fontSize:14, outline:"none", boxSizing:"border-box", background:"var(--input-bg)", color:"var(--text)" }} />
                  <button type="button" onClick={() => setShowPassword(v => !v)}
                    style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:16, color:"#9ca3af", padding:0 }}>
                    {showPassword ? "🙈" : "👁️"}
                  </button>
                </div>
              )}
              {mode === "register" && (
                <div style={{ position:"relative", marginBottom:10 }}>
                  <input type={showPassword ? "text" : "password"} placeholder="Confirmer le mot de passe" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} required
                    style={{ width:"100%", padding:"12px 44px 12px 14px", border:"2px solid var(--border)", borderRadius:12, fontSize:14, outline:"none", boxSizing:"border-box", background:"var(--input-bg)", color:"var(--text)" }} />
                  <button type="button" onClick={() => setShowPassword(v => !v)}
                    style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:16, color:"#9ca3af", padding:0 }}>
                    {showPassword ? "🙈" : "👁️"}
                  </button>
                </div>
              )}
              {error && <p style={{ color:"#ef4444", fontSize:12, margin:"0 0 10px", textAlign:"center" }}>{error}</p>}
              {success && <p style={{ color:EMERALD, fontSize:12, margin:"0 0 10px", textAlign:"center" }}>{success}</p>}
              <button type="submit" disabled={loading}
                style={{ width:"100%", padding:"13px", background:EMERALD, color:"white", fontWeight:800, fontSize:15, borderRadius:12, border:"none", cursor:"pointer", marginBottom:12 }}>
                {loading ? "..." : mode === "login" ? "Se connecter" : mode === "register" ? "Créer mon compte" : "Envoyer le lien"}
              </button>
            </form>

            <div style={{ textAlign:"center" }}>
              {mode === "login" && <>
                <button onClick={() => { setMode("register"); setError(""); }} style={{ background:"none", border:"none", color:EMERALD, fontSize:13, cursor:"pointer", fontWeight:600 }}>Créer un compte</button>
                <span style={{ color:"#9ca3af", fontSize:13, margin:"0 8px" }}>·</span>
                <button onClick={() => { setMode("forgot"); setError(""); }} style={{ background:"none", border:"none", color:"#9ca3af", fontSize:13, cursor:"pointer" }}>Mot de passe oublié ?</button>
              </>}
              {mode !== "login" && (
                <button onClick={() => { setMode("login"); setError(""); }} style={{ background:"none", border:"none", color:EMERALD, fontSize:13, cursor:"pointer", fontWeight:600 }}>← Retour à la connexion</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function getFinitionSimilaire(finition, finitionsList) {
      if (!finition) return null;
      const similaires = FINITIONS_SIMILAIRES[finition] || [];
      return similaires.find(f => finitionsList.includes(f)) || similaires[0] || null;
    }
    function getFinitions(marque, modele) {
      if (!marque || !modele) return [];
      const m = (marque || "").replace(/B\.M\.W\./g, "BMW").replace(/MERCEDES.*/i, "MERCEDES-BENZ").trim();
      const mod = (modele || "").trim();
      // Chercher par marque_modele exact
      const key = `${m}_${mod}`;
      if (FINITIONS[key]) return FINITIONS[key];
      // Chercher en ignorant la casse
      const keyLower = key.toLowerCase();
      const found = Object.keys(FINITIONS).find(k => k.toLowerCase() === keyLower);
      if (found) return FINITIONS[found];
      return [];
    }

    function normalize(str) {
      return (str || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-_]/g," ").trim();
    }

    function matchesVehicle(subject, marque, modele) {
      const s = normalize(subject);
      const marqueNorm = normalize(marque);
      const aliases = {
        "mercedes": ["mercedes","mercedes-benz","mercedes benz"],
        "mercedes-benz": ["mercedes","mercedes-benz","mercedes benz"],
        "volkswagen": ["volkswagen","vw"],
        "citroen": ["citroen","citroën"],
        "alfa romeo": ["alfa romeo","alfa"],
        "b.m.w.": ["bmw","b.m.w"],
        "bmw": ["bmw","b.m.w"],
      };
      // Normaliser le modèle (XCEE-D → xceed, L.CRUISER → land cruiser)
      const modeleAliases = {
        "xcee d": ["xceed","xcee-d","x ceed"],
        "xcee-d": ["xceed","xcee-d","x ceed"],
        "l cruiser": ["land cruiser","landcruiser"],
        "l.cruiser": ["land cruiser","landcruiser"],
        "discov sp": ["discovery sport","discovery"],
        "discov.sp": ["discovery sport","discovery"],
        "c3 aircr": ["c3 aircross","aircross"],
        "c3 aircr.": ["c3 aircross","aircross"],
        "subaru xv": ["xv","xcross"],
      };
      const modeleNormForAlias = normalize(modele);
      const modeleSearchTerms = modeleAliases[modeleNormForAlias] || null;
      const marqueAliases = aliases[marqueNorm] || [marqueNorm];
      if (!marqueAliases.some(a => s.includes(a))) return false;
      const modeleNorm = normalize(modele);
      // Mercedes Classe X
      const mercedesMatch = modeleNorm.match(/classe\s+(\w+)/);
      if (mercedesMatch) return s.includes(mercedesMatch[1].toLowerCase());
      // BMW Série X → cherche "serie X" ou "série X"
      const bmwSerieMatch = modeleNorm.match(/serie\s+(\d+)/);
      if (bmwSerieMatch) {
        const num = bmwSerieMatch[1];
        return s.includes(`serie ${num}`) || s.includes(`série ${num}`) || s.includes(`series ${num}`);
      }
      if (modeleSearchTerms) return modeleSearchTerms.some(term => s.includes(term));
      return modeleNorm.split(" ").filter(w => w.length > 1).every(mot => s.includes(mot));
    }

    function computeStats(ads) {
      const prices = ads.map(a => a.price?.[0]).filter(p => p && p > 500 && p < 100000);
      if (!prices.length) return null;
      prices.sort((a, b) => a - b);
      const medianRaw = prices[Math.floor(prices.length * 0.50)];
      const avg = Math.round(prices.reduce((s, p) => s + p, 0) / prices.length);
      const filtered = prices.filter(p => p >= medianRaw * 0.6 && p <= avg * 1.5);
      if (!filtered.length) return null;
      return { pMin: filtered[0], p25: filtered[Math.floor(filtered.length * 0.25)], p50: filtered[Math.floor(filtered.length * 0.50)], count: filtered.length };
    }

                <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", borderRadius:16, background:"rgba(255,255,255,0.7)" }}>
                  <p style={{ fontWeight:800, fontSize:15, color:"#111", margin:"0 0 8px", textAlign:"center" }}>🔒 Connectez-vous pour voir les prix</p>
                  <p style={{ fontSize:12, color:"rgba(255,255,255,0.75)", margin:"0 0 10px", textAlign:"center" }}>✨ C&apos;est gratuit · Aucune carte requise</p>

                    style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 20px", background:"white", border:"2px solid #e5e7eb", borderRadius:12, cursor:"pointer", fontSize:14, fontWeight:700, color:"#111", boxShadow:"0 2px 8px rgba(0,0,0,0.08)" }}>
                    <img src="https://www.google.com/favicon.ico" width={16} height={16} alt="" />
                    Continuer avec Google
                  </button>
                </div>
              )}
              </div>
            ) : (
              <div style={{ background:"white", borderRadius:16, padding:16, marginBottom:16, textAlign:"center" }}>
                <p style={{ color:"#6b7280", fontSize:14 }}>Aucune annonce similaire trouvée.</p>
              </div>

            {cleanAds.length > 0 && (
              <div style={{ position:"relative", marginBottom:16 }}>
                <div style={{ background:"var(--card)", borderRadius:14, border:"0.5px solid var(--border)", boxShadow:"0 1px 3px rgba(0,0,0,0.04)", overflow:"hidden", filter: isConnected ? "none" : "blur(4px)", pointerEvents: isConnected ? "auto" : "none" }}>
                  <div style={{ padding:"10px 16px", borderBottom:"0.5px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <p style={{ margin:0, fontSize:10, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.08em" }}>🔍 Annonces similaires</p>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill, minmax(260px, 1fr))", overflowX:"auto" }}>
                  {cleanAds.map((ad, i) => (
                    <a key={i} href={ad.url} target="_blank" rel="noopener noreferrer"
                      style={{ display:"flex", flexDirection:"column", padding:"12px 14px", borderRight: !isMobile && i % 3 < 2 ? "0.5px solid var(--border)" : "none", borderBottom: i < cleanAds.length - 1 ? "0.5px solid var(--border)" : "none", textDecoration:"none" }}>
                      <p style={{ margin:0, fontSize:11, fontWeight:600, color:"var(--text)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{ad.subject}</p>
                      <p style={{ margin:"2px 0 0", fontSize:10, color:"var(--text3)" }}>
                        {getAttr(ad,"regdate") ? getAttr(ad,"regdate")+" · " : ""}
                        {getAttr(ad,"mileage") ? parseInt(getAttr(ad,"mileage")).toLocaleString("fr-FR")+" km" : ""}
                      </p>
                      <p style={{ margin:"4px 0 0", fontSize:13, fontWeight:700, color:EMERALD }}>{ad.price?.[0]?.toLocaleString("fr-FR")} €</p>
                    </a>
                  ))}
                  </div>
                </div>
                {isConnected && showCount < allCleanAds.length && (
                  <button onClick={() => { setShowCount(c => Math.min(c + 9, allCleanAds.length)); if(window.posthog) posthog.capture('voir_plus_clique'); }}
                    style={{ width:"100%", padding:"10px", background:"var(--bg)", border:"none", borderTop:"0.5px solid var(--border)", cursor:"pointer", fontSize:12, fontWeight:600, color:"var(--text2)" }}>
                    Voir plus ({allCleanAds.length - showCount} annonces restantes)
                  </button>

                {!isConnected && (
                  <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", borderRadius:16, background:"rgba(255,255,255,0.7)" }}>
                    <p style={{ fontWeight:800, fontSize:15, color:"#111", margin:"0 0 8px", textAlign:"center" }}>🔒 Connectez-vous pour voir les annonces</p>
                  <p style={{ fontSize:12, color:"rgba(255,255,255,0.75)", margin:"0 0 10px", textAlign:"center" }}>✨ C&apos;est gratuit · Aucune carte requise</p>
                    <button onClick={() => auth.signInWithPopup(googleProvider).then(() => { if(window.posthog) posthog.capture('connexion_google'); })}
                      style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 20px", background:"white", border:"2px solid #e5e7eb", borderRadius:12, cursor:"pointer", fontSize:14, fontWeight:700, color:"#111", boxShadow:"0 2px 8px rgba(0,0,0,0.08)" }}>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>

                🔗 Publier sur Leboncoin
              </button>
              <button onClick={onReset} style={{ background:EMERALD, color:"white", fontWeight:700, fontSize:14, borderRadius:50, padding:"13px 0", border:"none", cursor:"pointer" }}>
                🔄 Nouvelle recherche
              </button>
            </div>
            <button onClick={handleCopy} style={{ width:"100%", background: copied ? "var(--badge-bg)" : "var(--card)", color: copied ? EMERALD : "var(--text2)", fontWeight:700, fontSize:14, borderRadius:50, padding:"12px 0", border:`1.5px solid ${copied ? EMERALD : "var(--border)"}`, cursor:"pointer", transition:"all 0.2s", marginTop:6 }}>

    // ─── CRÉER UNE ANNONCE ───────────────────────────────────────
    function CreateAnnonce({ result, plate, user, onClose, onPublished }) {
      const [step, setStep] = React.useState(1);
      const [prix, setPrix] = React.useState(result.stats?.p25 ? String(Math.round(result.stats.p25)) : "");
      const [localisation, setLocalisation] = React.useState("");
      const [ville, setVille] = React.useState("");
      const [defauts, setDefauts] = React.useState("");
      const [description, setDescription] = React.useState("");
      const [options, setOptions] = React.useState("");
      const [tel, setTel] = React.useState("");
      const [photos, setPhotos] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [lbcText, setLbcText] = React.useState("");
      const [copied, setCopied] = React.useState(false);
      const { veh, nom, finition } = result;
      const annee = veh.AWN_date_mise_en_circulation?.slice(-4) || "";
      const energie = veh.AWN_energie || "";
      const ch = veh.AWN_puissance_CH || "";
      const km = result.kmUser || "";

      function handlePhotos(e) {
        const files = Array.from(e.target.files);
        const newPhotos = files.map(f => ({ file: f, name: f.name, data: URL.createObjectURL(f) }));
        setPhotos(prev => {
          const combined = Array.isArray(prev) ? [...prev, ...newPhotos] : newPhotos;
          return combined.slice(0, 5);
        });
      }

      async function generateLbcText() {
        setStep(3);
        setLbcText("✨ Génération de la description par IA...");
        try {
          const prompt = `Rôle : Agis en tant qu'expert en rédaction SEO automobile et vendeur spécialisé. Ta mission est de rédiger une description de vente percutante, concise et personnalisée pour le véhicule suivant : ${nom}${finition ? " " + finition : ""}.

Données du véhicule :
* Année : ${annee}
* Kilométrage : ${km ? km.toLocaleString("fr-FR") + " km" : "Non renseigné"}
* Énergie : ${energie}
* Boîte : ${result.veh?.AWN_boite || ""}
* Prix : ${parseInt(prix).toLocaleString("fr-FR")} €
* Localisation : ${localisation}${ville ? " " + ville : ""}
* État/Options spécifiques : ${[options, defauts].filter(Boolean).join(" | ") || "Non renseigné"}

Consignes de rédaction :
1. Recherche Intelligente : Utilise tes connaissances internes pour identifier les 2 ou 3 points forts spécifiques à ce modèle exact (ex: fiabilité du moteur, volume de coffre record, confort de suspension, faible consommation).
2. Style : Ton direct, professionnel mais engageant. Évite le jargon trop technique inutile, privilégie le bénéfice pour l'acheteur.
3. Structure (Maximum 150-200 mots) :
   * Accroche : Une phrase forte qui donne envie.
   * Présentation : Résumé de l'état général et de l'entretien.
   * Points forts du modèle : 3 points à puces mettant en avant le confort/performance/équipement spécifique à ce modèle.
   * Appel à l'action : Invitation courte à venir voir le véhicule.
4. Format : Utilise des emojis pertinents pour la lisibilité (🚗, ✅, 🛡️). Pas de gras inutile sur tout le texte, juste sur les infos clés.
Interdiction : Ne pas inventer d'historique de révision si non mentionné, ne pas faire de texte trop long.`;

          const res = await fetch(`/api/gemini`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
          });
          const data = await res.json();
          const text = (data.text || "").trim();
          if (!text) throw new Error("Réponse vide");
          const finalText = `${text}\n\n📞 Contact : ${tel}\n💡 Prix estimé via CoteCars.fr — basé sur le marché Leboncoin en temps réel.`;
          setLbcText(finalText);
          if (window._annonceId) {
            db.collection("annonces").doc(window._annonceId).update({ descriptionIA: text }).catch(()=>{});
          }
        } catch(e) {
          const title = `${nom}${finition ? " " + finition : ""} ${km ? km.toLocaleString("fr-FR") + " km" : ""}`.trim();
          const lines = [
            `🚗 ${title}`, ``,
            `📍 Localisation : ${localisation}`,
            `💰 Prix : ${parseInt(prix).toLocaleString("fr-FR")} €`, ``,
            `📋 Caractéristiques :`,
            `• Énergie : ${energie}`,
            `• Puissance : ${ch} ch`,
            `• Année : ${annee}`,
            km ? `• Kilométrage : ${km.toLocaleString("fr-FR")} km` : null,
            `• Boîte : ${result.veh?.AWN_boite || ""}`,
            finition ? `• Finition : ${finition}` : null, ``,
            options ? `✅ Équipements :\n${options}` : null, ``,
            description ? `📝 Description :\n${description}` : null, ``,
            defauts ? `⚠️ À noter :\n${defauts}` : null, ``,
            `📞 Contact : ${tel}`, ``,
            `Prix estimé via CoteCars.fr — basé sur le marché Leboncoin en temps réel.`,
          ].filter(l => l !== null).join("\n");
          setLbcText(lines);
        }
      }

      async function handlePublish() {
        if (!user) return;
        setLoading(true);
        try {
          // Upload photos sur Cloudinary
          const photoUrls = await Promise.all(photos.map(async p => {
            const ref = storage.ref(`annonces/${Date.now()}_${Math.random().toString(36).slice(2)}_${p.name}`);
            await ref.put(p.file);
            return ref.getDownloadURL();
          }));
          const annonce = {
            uid: user.uid,
            userEmail: user.email,
            userPhoto: user.photoURL || "",
            plate,
            nom,
            finition: finition || "",
            annee,
            energie,
            ch,
            km: km || null,
            gearbox: result.gearbox || "", boite: result.veh?.AWN_boite || "",
            prix: parseInt(prix),
            localisation: `${localisation}${ville ? " " + ville : ""}`,
            defauts,
            options,
            tel,
            photos: photoUrls,
            description,
            stats: result.stats,
            createdAt: new Date().toISOString(),
            active: true,
          };
          const ref = await db.collection("annonces").add(annonce);
          window._annonceId = ref.id;
          await generateLbcText();
          onPublished && onPublished();
        } catch(e) {
          console.error(e);
          alert("Erreur : " + e.message);
        }
        setLoading(false);
      }

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:2000, display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
          <div style={{ background:"white", borderRadius:"24px 24px 0 0", width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto", padding:"24px 20px 40px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <span style={{ fontWeight:800, fontSize:17, color:"#111" }}>
                {step===1 ? "📝 Créer mon annonce" : step===2 ? "📸 Photos & contact" : "✅ Annonce publiée !"}
              </span>
              <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#9ca3af" }}>✕</button>
            </div>

            {/* Étape 1 — Infos */}
            {step===1 && (
              <div>
                <div style={{ background:"#eff4ff", border:"1px solid #93c5fd", borderRadius:12, padding:"10px 14px", marginBottom:16, fontSize:13, color:"#1e3a8a" }}>
                  🚗 <strong>{nom}</strong>{finition ? ` · ${finition}` : ""} · {annee} · {energie} · {ch} ch
                </div>
                <label style={{ display:"block", fontSize:11, fontWeight:800, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Prix demandé (€)</label>
                <input type="number" value={prix} onChange={e=>setPrix(e.target.value)} placeholder="Ex: 12500"
                  style={{ width:"100%", padding:"14px", border:"2px solid #e5e7eb", borderRadius:12, fontSize:18, fontWeight:700, marginBottom:14, boxSizing:"border-box", outline:"none" }} />
                {result.stats && (
                  <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                    {[{label:"⚡️ Agressif", val:result.stats.pMin},{label:"🎯 Marché", val:result.stats.p25},{label:"💎 Haut", val:result.stats.p50}].map((p,i)=>(
                      <button key={i} onClick={()=>setPrix(String(Math.round(p.val)))}
                        style={{ flex:1, padding:"8px 4px", borderRadius:10, border:`2px solid ${String(Math.round(p.val))===prix?"#1a3fdb":"#e5e7eb"}`, background:String(Math.round(p.val))===prix?"#eff4ff":"white", fontSize:11, fontWeight:700, color:String(Math.round(p.val))===prix?"#1a3fdb":"#6b7280", cursor:"pointer" }}>
                        {p.label}<br/>{Math.round(p.val).toLocaleString("fr-FR")}€
                      </button>
                    ))}
                  </div>
                )}
                <label style={{ display:"block", fontSize:11, fontWeight:800, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Localisation</label>
                <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                  <input type="text" value={localisation} onChange={e=>{ 
                    const val = e.target.value.replace(/\D/g,"").slice(0,5);
                    setLocalisation(val);
                    if(val.length===5) {
                      fetch(`https://geo.api.gouv.fr/communes?codePostal=${val}&fields=nom&limit=1`)
                        .then(r=>r.json())
                        .then(d=>{ if(d?.[0]?.nom) setVille(d[0].nom); })
                        .catch(()=>{});
                    }
                  }} placeholder="Code postal" maxLength={5}
                    style={{ width:"40%", padding:"14px", border:"2px solid #e5e7eb", borderRadius:12, fontSize:15, boxSizing:"border-box", outline:"none" }} />
                  <input type="text" value={ville} onChange={e=>setVille(e.target.value)} placeholder="Ville"
                    style={{ width:"60%", padding:"14px", border:"2px solid #e5e7eb", borderRadius:12, fontSize:15, boxSizing:"border-box", outline:"none" }} />
                </div>
                <label style={{ display:"block", fontSize:11, fontWeight:800, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Équipements & options</label>
                <textarea value={options} onChange={e=>setOptions(e.target.value)} placeholder="Ex: Toit ouvrant, GPS, Sièges chauffants, Caméra de recul..."
                  style={{ width:"100%", padding:"14px", border:"2px solid #e5e7eb", borderRadius:12, fontSize:14, marginBottom:14, boxSizing:"border-box", outline:"none", minHeight:80, resize:"vertical" }} />
                <label style={{ display:"block", fontSize:11, fontWeight:800, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Défauts & pannes éventuelles</label>
                <textarea value={defauts} onChange={e=>setDefauts(e.target.value)} placeholder="Ex: Rayure sur l'aile avant droite, climatisation à revoir..."
                  style={{ width:"100%", padding:"14px", border:"2px solid #e5e7eb", borderRadius:12, fontSize:14, marginBottom:16, boxSizing:"border-box", outline:"none", minHeight:80, resize:"vertical" }} />
                <button onClick={()=>setStep(2)} disabled={!prix||!localisation||!ville}
                  style={{ width:"100%", background:(!prix||!localisation||!ville)?"#d1d5db":"linear-gradient(135deg,#1a3fdb,#0f28a8)", color:"white", fontWeight:800, fontSize:17, borderRadius:16, padding:"16px 0", border:"none", cursor:(!prix||!localisation||!ville)?"not-allowed":"pointer" }}>
                  Suivant →
                </button>
              </div>
            )}

            {/* Étape 2 — Photos & contact */}
            {step===2 && (
              <div>
                <label style={{ display:"block", fontSize:11, fontWeight:800, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Photos (max 5)</label>
                <label style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", border:"2px dashed #e5e7eb", borderRadius:16, padding:"24px", cursor:"pointer", marginBottom:14, background:"#f9fafb" }}>
                  <span style={{ fontSize:32, marginBottom:8 }}>📸</span>
                  <span style={{ fontSize:14, color:"#6b7280", fontWeight:600 }}>Ajouter des photos</span>
                  <span style={{ fontSize:12, color:"#9ca3af", marginTop:4 }}>{photos.length} photo(s) sélectionnée(s)</span>
                  <input type="file" accept="image/*" multiple onChange={handlePhotos} style={{ display:"none" }} />
                </label>
                {photos.length > 0 && (
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:14 }}>
                    {photos.map((p,i) => (
                      <img key={i} src={p.data} alt="" style={{ width:"100%", aspectRatio:"1", objectFit:"cover", borderRadius:8 }} />
                    ))}
                  </div>
                )}
                <label style={{ display:"block", fontSize:11, fontWeight:800, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Téléphone de contact</label>
                <input type="tel" value={tel} onChange={e=>setTel(e.target.value)} placeholder="Ex: 06 12 34 56 78"
                  style={{ width:"100%", padding:"14px", border:"2px solid #e5e7eb", borderRadius:12, fontSize:16, marginBottom:16, boxSizing:"border-box", outline:"none" }} />
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={()=>setStep(1)} style={{ flex:1, background:"white", color:"#6b7280", fontWeight:700, fontSize:15, borderRadius:16, padding:"14px 0", border:"2px solid #e5e7eb", cursor:"pointer" }}>← Retour</button>
                  <button onClick={handlePublish} disabled={loading||!tel}
                    style={{ flex:2, background:(!tel||loading)?"#d1d5db":"linear-gradient(135deg,#1a3fdb,#0f28a8)", color:"white", fontWeight:800, fontSize:16, borderRadius:16, padding:"14px 0", border:"none", cursor:(!tel||loading)?"not-allowed":"pointer" }}>
                    {loading ? "Publication..." : "🚀 Publier l'annonce"}
                  </button>
                </div>
              </div>
            )}

            {/* Étape 3 — Succès + texte LBC */}
            {step===3 && (
              <div>
                <div style={{ background:"#eff4ff", border:"1px solid #93c5fd", borderRadius:16, padding:"16px", marginBottom:16, textAlign:"center" }}>
                  <p style={{ fontSize:28, margin:"0 0 8px" }}>🎉</p>
                  <p style={{ fontWeight:800, fontSize:16, color:"#1e3a8a", margin:0 }}>Annonce publiée sur CoteCars !</p>
                  <p style={{ fontSize:13, color:"#0f28a8", margin:"4px 0 0" }}>Elle est maintenant visible par les acheteurs.</p>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                  <p style={{ fontSize:13, fontWeight:700, color:"#111", margin:0 }}>✨ Texte IA pour Leboncoin :</p>
                  {lbcText === "✨ Génération de la description par IA..." && (
                    <div className="spinner" style={{ width:16, height:16, borderRadius:"50%", border:"2px solid #e5e7eb", borderTopColor:EMERALD }} />
                  )}
                </div>
                <textarea readOnly value={lbcText} style={{ width:"100%", minHeight:220, padding:"14px", border:"2px solid #e5e7eb", borderRadius:12, fontSize:12, boxSizing:"border-box", outline:"none", resize:"vertical", color:"#374151", background:"#f9fafb" }} />
                <button onClick={() => { navigator.clipboard.writeText(lbcText); setCopied(true); setTimeout(()=>setCopied(false),2500); }}
                  style={{ width:"100%", background:copied?"#eff4ff":"white", color:copied?"#1a3fdb":"#6b7280", fontWeight:700, fontSize:15, borderRadius:16, padding:"14px 0", border:`2px solid ${copied?"#1a3fdb":"#e5e7eb"}`, cursor:"pointer", marginTop:10, transition:"all 0.2s" }}>
                  {copied ? "✅ Copié !" : "📋 Copier le texte Leboncoin"}
                </button>
                <a href="https://www.leboncoin.fr/deposer-une-annonce" target="_blank" rel="noopener noreferrer"
                  style={{ display:"block", width:"100%", background:"#FF6E14", color:"white", fontWeight:800, fontSize:15, borderRadius:16, padding:"14px 0", border:"none", cursor:"pointer", marginTop:10, textAlign:"center", textDecoration:"none", boxSizing:"border-box" }}>
                  🔗 Ouvrir Leboncoin pour publier
                </a>
              </div>
            )}
          </div>
        </div>

                    <input type="text" value={ville} onChange={e=>setVille(e.target.value)} placeholder="Ville" style={{...I,width:"60%"}}/>
                  </div>

                  <label style={L}>📞 Numéro de téléphone</label>
                  <input type="tel" value={tel} onChange={e=>setTel(e.target.value)} placeholder="Ex: 06 12 34 56 78" style={{...I,marginBottom:20}}/>

                    </div>
                    <p style={{margin:0,padding:"0 14px 12px",fontSize:16,fontWeight:700,color:"#111"}}>{titreIA}</p>

                  <Card k="type"      emoji="🚘" label="Type de véhicule"       val={typeVehicule}                          lbc={true}/>

                  <Card k="portes"    emoji="🚪" label="Nombre de portes"       val={nbPortes}                             lbc={true}/>
                  <Card k="puissance" emoji="⚡️" label="Puissance (ch)"         val={puissance}/>

                  {/* Description IA */}

                  <a href="https://www.leboncoin.fr/deposer-une-annonce" target="_blank" rel="noopener noreferrer"
                    style={{display:"block",width:"100%",background:"linear-gradient(135deg,#F97316,#EA580C)",color:"white",fontWeight:800,fontSize:16,borderRadius:16,padding:"16px 0",textAlign:"center",textDecoration:"none",marginTop:6,boxSizing:"border-box"}}>

    // ─── PAGE ANNONCES ────────────────────────────────────────────

      const [filterMarque, setFilterMarque] = React.useState("");
      const [filterModele, setFilterModele] = React.useState("");
      const [filterEnergie, setFilterEnergie] = React.useState("");

      const [showAnnonceMenu, setShowAnnonceMenu] = React.useState(false);

      const marques = [...new Set(annonces.map(a => a.nom?.split(" ")[0]).filter(Boolean))].sort();
      const modeles = [...new Set(annonces.filter(a => !filterMarque || a.nom?.startsWith(filterMarque)).map(a => a.nom).filter(Boolean))].sort();

      React.useEffect(() => {
        db.collection("annonces").orderBy("createdAt","desc").limit(100)
          .get().then(snap => {
            const all = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(a => a.active !== false);
            setAnnonces(all);
            setLoading(false);
          }).catch(() => setLoading(false));

        if (search && !`${a.nom} ${a.finition}`.toLowerCase().includes(search.toLowerCase())) return false;
        if (filterMarque && !a.nom?.startsWith(filterMarque)) return false;
        if (filterModele && a.nom !== filterModele) return false;
        if (filterEnergie && a.energie?.toLowerCase() !== filterEnergie.toLowerCase()) return false;
        if (filterPrixMax && a.prix > parseInt(filterPrixMax)) return false;
        if (filterKmMax && a.km > parseInt(filterKmMax)) return false;
        if (filterLoc && !a.localisation?.toLowerCase().includes(filterLoc.toLowerCase())) return false;
        return true;
      });

      const hasFilters = search || filterMarque || filterModele || filterEnergie || filterPrixMax || filterKmMax || filterLoc;

      if (selected) return <AnnonceDetail annonce={selected} onBack={()=>setSelected(null)} user={user} />;

              <div style={{ position:"absolute", top:56, left:0, right:0, background:"var(--card)", borderBottom:"1px solid var(--border)", boxShadow:"0 8px 24px rgba(0,0,0,0.12)", padding:"8px 0" }}
                onClick={e => e.stopPropagation()}>
                <button onClick={() => { onBack(); setShowAnnonceMenu(false); }}
                  style={{ width:"100%", display:"flex", alignItems:"center", gap:14, padding:"14px 20px", background:"none", border:"none", cursor:"pointer", textAlign:"left", borderBottom:"0.5px solid var(--border)" }}>
                  <span style={{ fontSize:20 }}>🏠</span>
                  <div><p style={{ margin:0, fontSize:14, fontWeight:700, color:"var(--text)" }}>Accueil</p><p style={{ margin:0, fontSize:11, color:"var(--text3)" }}>Retour à la recherche</p></div>
                </button>
                <button onClick={() => { setShowFilters(!showFilters); setShowAnnonceMenu(false); }}
                  style={{ width:"100%", display:"flex", alignItems:"center", gap:14, padding:"14px 20px", background:"none", border:"none", cursor:"pointer", textAlign:"left" }}>
                  <span style={{ fontSize:20 }}>⚙️</span>
                  <div><p style={{ margin:0, fontSize:14, fontWeight:700, color: hasFilters ? "#1a3fdb" : "var(--text)" }}>{hasFilters ? "Filtres actifs" : "Filtres"}</p><p style={{ margin:0, fontSize:11, color:"var(--text3)" }}>Affiner les résultats</p></div>
                </button>
              </div>
            </div>
          )}

          {/* ── NAVBAR ANNONCES ── */}
          <div style={{ background:"var(--nav-bg)", borderBottom:"0.5px solid var(--border)", padding: isMobile ? "0 16px" : "0 32px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap: isMobile ? 10 : 16 }}>
              <button onClick={onBack} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"var(--text2)", padding:0 }}>←</button>
              <span style={{ fontWeight:800, fontSize: isMobile ? 22 : 32, color:"var(--text)", letterSpacing:"-0.5px" }}>Cote<span style={{color:"#1a3fdb"}}>Cars</span></span>
              {!isMobile && <span style={{ fontSize:13, color:"var(--text3)", fontWeight:500 }}>Annonces</span>}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap: isMobile ? 8 : 12 }}>
              <DarkToggle />
              {isMobile ? (
                <button onClick={() => setShowAnnonceMenu(m=>!m)}
                  style={{ display:"flex", flexDirection:"column", justifyContent:"center", gap:5, width:36, height:36, background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, cursor:"pointer", padding:"0 8px" }}>
                  <div style={{ height:2, background:"var(--text)", borderRadius:2 }} />
                  <div style={{ height:2, background:"var(--text)", borderRadius:2 }} />
                  <div style={{ height:2, background:"var(--text)", borderRadius:2 }} />
                </button>
              ) : (
                <button onClick={()=>setShowFilters(!showFilters)}
                  style={{ background: hasFilters ? "#1B3FDB" : "var(--bg)", border:"1px solid var(--border)", borderRadius:50, padding:"7px 18px", fontSize:12, fontWeight:600, color: hasFilters ? "white" : "var(--text2)", cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
                  ⚙️ {hasFilters ? "Filtres actifs" : "Filtres"}
                </button>
              )}
            </div>
          </div>

          {/* Filters panel */}
          {showFilters && (
            <div style={{ background:"var(--card)", borderBottom:"0.5px solid var(--border)", padding: isMobile ? "12px 16px" : "14px 32px" }}>
              <div style={{ display:"grid", gridTemplateColumns: isMobile ? "repeat(2,1fr)" : "repeat(6,1fr)", gap:10, maxWidth:1200, margin:"0 auto" }}>
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Marque</div>
                  <select value={filterMarque} onChange={e=>{ setFilterMarque(e.target.value); setFilterModele(""); }}
                    style={{ width:"100%", padding:"7px 10px", border:"1px solid var(--border)", borderRadius:8, fontSize:12, outline:"none", background:"var(--input-bg)", color:"var(--text)", cursor:"pointer" }}>
                    <option value="">Toutes</option>
                    {marques.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Modèle</div>
                  <select value={filterModele} onChange={e=>setFilterModele(e.target.value)}
                    style={{ width:"100%", padding:"7px 10px", border:"1px solid var(--border)", borderRadius:8, fontSize:12, outline:"none", background:"var(--input-bg)", color:"var(--text)", cursor:"pointer" }}>
                    <option value="">Tous</option>
                    {modeles.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Énergie</div>
                  <select value={filterEnergie} onChange={e=>setFilterEnergie(e.target.value)}
                    style={{ width:"100%", padding:"7px 10px", border:"1px solid var(--border)", borderRadius:8, fontSize:12, outline:"none", background:"var(--input-bg)", color:"var(--text)", cursor:"pointer" }}>
                    <option value="">Toutes</option>
                    <option value="GAZOLE">Diesel</option>
                    <option value="ESSENCE">Essence</option>
                    <option value="ELECTRIQUE">Électrique</option>
                    <option value="HYBRIDE">Hybride</option>
                  </select>
                </div>
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Prix max</div>
                  <select value={filterPrixMax} onChange={e=>setFilterPrixMax(e.target.value)}
                    style={{ width:"100%", padding:"7px 10px", border:"1px solid var(--border)", borderRadius:8, fontSize:12, outline:"none", background:"var(--input-bg)", color:"var(--text)", cursor:"pointer" }}>
                    <option value="">Tous</option>
                    <option value="5000">5 000 €</option>
                    <option value="10000">10 000 €</option>
                    <option value="20000">20 000 €</option>
                    <option value="30000">30 000 €</option>
                    <option value="50000">50 000 €</option>
                  </select>
                </div>
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Km max</div>
                  <select value={filterKmMax} onChange={e=>setFilterKmMax(e.target.value)}
                    style={{ width:"100%", padding:"7px 10px", border:"1px solid var(--border)", borderRadius:8, fontSize:12, outline:"none", background:"var(--input-bg)", color:"var(--text)", cursor:"pointer" }}>
                    <option value="">Tous</option>
                    <option value="50000">50 000 km</option>
                    <option value="100000">100 000 km</option>
                    <option value="150000">150 000 km</option>
                    <option value="200000">200 000 km</option>
                  </select>
                </div>
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Ville</div>
                  <input value={filterLoc} onChange={e=>setFilterLoc(e.target.value)} placeholder="Ex: Paris..."
                    style={{ width:"100%", padding:"7px 10px", border:"1px solid var(--border)", borderRadius:8, fontSize:12, outline:"none", background:"var(--input-bg)", color:"var(--text)", boxSizing:"border-box" }} />
                </div>
              </div>
              {hasFilters && (
                <div style={{ maxWidth:1200, margin:"10px auto 0" }}>
                  <button onClick={()=>{ setSearch(""); setFilterMarque(""); setFilterModele(""); setFilterEnergie(""); setFilterPrixMax(""); setFilterKmMax(""); setFilterLoc(""); }}
                    style={{ padding:"6px 14px", background:"#fee2e2", color:"#ef4444", border:"none", borderRadius:8, fontSize:12, fontWeight:600, cursor:"pointer" }}>
                    ✕ Réinitialiser les filtres
                  </button>
                </div>
              )}
            </div>
          )}

          <div style={{ padding: isMobile ? "12px 12px" : "24px 32px", maxWidth:1200, margin:"0 auto" }}>
            {/* Search bar */}
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher une marque, modèle, finition..."
                style={{ flex:1, padding:"11px 16px", border:"1px solid var(--border)", borderRadius:10, fontSize:14, boxSizing:"border-box", outline:"none", background:"var(--card)", color:"var(--text)" }} />
              <span style={{ fontSize:13, color:"var(--text3)", whiteSpace:"nowrap" }}>
                {filtered.length} annonce{filtered.length > 1 ? "s" : ""}
              </span>
            </div>

            {loading && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(240px, 1fr))", gap:16 }}>
                {[1,2,3,4,5,6].map(i => (
                  <div key={i} style={{ background:"var(--card)", borderRadius:12, border:"0.5px solid var(--border)", overflow:"hidden" }}>
                    <div style={{ height:160, background:"var(--bg3)" }} />
                    <div style={{ padding:"12px 14px", display:"flex", flexDirection:"column", gap:6 }}>
                      <div style={{ height:12, width:"70%", background:"var(--border)", borderRadius:4 }} />
                      <div style={{ height:10, width:"50%", background:"var(--border)", borderRadius:4 }} />

                  </div>
                ))}

            )}

            {!loading && filtered.length === 0 && (
              <div style={{ textAlign:"center", padding:"80px 0" }}>
                <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
                <div style={{ fontSize:16, fontWeight:600, color:"var(--text)", marginBottom:6 }}>Aucune annonce trouvée</div>
                <div style={{ fontSize:13, color:"var(--text3)" }}>Essayez de modifier vos critères de recherche</div>

            {!loading && filtered.length > 0 && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))", gap:16 }}>
                {filtered.map(a => (
                  <button key={a.id} onClick={()=>setSelected(a)}
                    style={{ background:"var(--card)", borderRadius:20, border:"0.5px solid var(--border)", overflow:"hidden", textAlign:"left", cursor:"pointer", padding:0, transition:"transform 0.15s, box-shadow 0.15s" }}
                    onMouseEnter={e => { e.currentTarget.style.transform="translateY(-4px)"; e.currentTarget.style.boxShadow="0 16px 40px rgba(0,0,0,0.12)"; }}
                    onMouseLeave={e => { e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="none"; }}>
                    {a.photos?.[0]
                      ? <img src={a.photos[0]} alt="" style={{ width:"100%", height:170, objectFit:"cover" }} />
                      : <div style={{ width:"100%", height:170, background:"var(--bg)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:40 }}>🚗</div>
                    }
                    <div style={{ padding:"12px 14px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
                        <div style={{ flex:1, minWidth:0, marginRight:8 }}>
                          <div style={{ fontWeight:700, fontSize:13, color:"var(--text)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                            {a.nom}{a.finition ? ` · ${a.finition}` : ""}
                          </div>
                          <div style={{ fontSize:11, color:"var(--text3)", marginTop:2 }}>
                            {a.annee} · {a.energie} · {a.ch} ch{a.km ? ` · ${a.km?.toLocaleString("fr-FR")} km` : ""}
                          </div>
                        </div>
                        <div style={{ fontSize:16, fontWeight:700, color:"#1a3fdb", whiteSpace:"nowrap", flexShrink:0 }}>
                          {a.prix?.toLocaleString("fr-FR")} €
                        </div>
                      </div>
                      <div style={{ fontSize:11, color:"var(--text2)" }}>📍 {a.localisation}</div>
                    </div>
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      );

    // ─── DÉTAIL ANNONCE ───────────────────────────────────────────
    function AnnonceDetail({ annonce: a, onBack, user }) {
      const [photoPlein, setPhotoPlein] = React.useState(null);
      const [photoActive, setPhotoActive] = React.useState(0);
      const isOwner = user?.uid === a.uid;
      const photos = a.photos || [];

      async function handleDelete() {
        if (!confirm("Supprimer cette annonce ?")) return;
        await db.collection("annonces").doc(a.id).update({ active: false });
        onBack();
      }

            </div>

          {/* ══ DESKTOP ══ */}
          <div className="detail-desktop" style={{ maxWidth:1200, margin:"0 auto", padding:"32px 40px 60px" }}>

                {/* Grande photo principale */}
                <div style={{ borderRadius:16, overflow:"hidden", background:"var(--bg3)", marginBottom:10, cursor: photos.length > 0 ? "pointer" : "default", position:"relative" }}
                  onClick={() => photos[photoActive] && setPhotoPlein(photos[photoActive])}>
                  {photos.length > 0
                    ? <img src={photos[photoActive]} alt="" style={{ width:"100%", height:460, objectFit:"cover", display:"block" }} />
                    : <div style={{ width:"100%", height:460, display:"flex", alignItems:"center", justifyContent:"center", fontSize:72, color:"var(--text3)" }}>🚗</div>
                  }
                  {photos.length > 1 && (
                    <div style={{ position:"absolute", bottom:14, right:14, background:"rgba(0,0,0,0.5)", color:"white", fontSize:12, fontWeight:600, padding:"4px 12px", borderRadius:999 }}>
                      {photoActive+1} / {photos.length}
                    </div>
                  )}
                </div>
                {/* Miniatures */}
                {photos.length > 1 && (
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:28 }}>
                    {photos.map((p,i) => (
                      <img key={i} src={p} alt="" onClick={()=>setPhotoActive(i)}
                        style={{ width:88, height:64, objectFit:"cover", borderRadius:10, cursor:"pointer",
                          border: i===photoActive ? "2.5px solid #1a3fdb" : "2.5px solid transparent",
                          opacity: i===photoActive ? 1 : 0.65, transition:"all 0.15s" }} />
                    ))}
                  </div>
                )}

                {/* Description */}
                {(a.descriptionIA || a.description) && (
                  <div style={{ background:"var(--card)", borderRadius:14, border:"0.5px solid var(--border)", padding:"18px 22px", marginBottom:12 }}>
                    <p style={{ fontWeight:700, fontSize:13, color:"var(--text)", margin:"0 0 8px" }}>✨ Description</p>
                    <p style={{ fontSize:13, color:"var(--text2)", margin:0, whiteSpace:"pre-line", lineHeight:1.7 }}>{a.descriptionIA || a.description}</p>
                  </div>
                )}
                {/* Équipements */}
                {a.options && (
                  <div style={{ background:"var(--card)", borderRadius:14, border:"0.5px solid var(--border)", padding:"18px 22px", marginBottom:12 }}>
                    <p style={{ fontWeight:700, fontSize:13, color:"var(--text)", margin:"0 0 8px" }}>✅ Équipements</p>
                    <p style={{ fontSize:13, color:"var(--text2)", margin:0, lineHeight:1.7 }}>{a.options}</p>
                  </div>
                )}
                {/* Défauts */}
                {a.defauts && (
                  <div style={{ background:"#fff7ed", border:"1px solid #fed7aa", borderRadius:14, padding:"18px 22px" }}>
                    <p style={{ fontWeight:700, fontSize:13, color:"#92400e", margin:"0 0 8px" }}>⚠️ À noter</p>
                    <p style={{ fontSize:13, color:"#92400e", margin:0, whiteSpace:"pre-line", lineHeight:1.7 }}>{a.defauts}</p>
                  </div>
                )}
              </div>

              {/* ── Colonne droite sticky ── */}
              <div style={{ position:"sticky", top:72, display:"flex", flexDirection:"column", gap:12 }}>

                {/* Titre + prix */}
                <div style={{ background:"var(--card)", borderRadius:16, border:"0.5px solid var(--border)", padding:"20px 22px" }}>
                  <h1 style={{ fontWeight:800, fontSize:22, color:"var(--text)", margin:"0 0 6px", lineHeight:1.25 }}>
                    {a.nom}
                    {a.finition && <span style={{ color:"var(--text2)", fontWeight:600 }}>{` · ${a.finition}`}</span>}
                  </h1>
                  <p style={{ margin:"0 0 4px", fontSize:13, color:"var(--text2)" }}>
                    {a.annee} · {a.energie} · {a.ch} ch{a.km ? ` · ${a.km?.toLocaleString("fr-FR")} km` : ""} · {a.boite || (a.gearbox==="1"?"Manuelle":"Automatique")}
                  </p>
                  <p style={{ margin:"0 0 16px", fontSize:13, color:"var(--text2)" }}>📍 {a.localisation}</p>
                  <span style={{ fontSize:36, fontWeight:800, color:EMERALD, letterSpacing:"-1px" }}>{a.prix?.toLocaleString("fr-FR")} €</span>
                </div>

                {/* Stats CoteCars */}
                {a.stats && (
                  <div style={{ background:"#eff4ff", border:"1px solid #93c5fd", borderRadius:16, padding:"16px 18px" }}>
                    <p style={{ margin:"0 0 12px", fontSize:11, fontWeight:800, color:"#1a3fdb", textTransform:"uppercase", letterSpacing:"0.08em" }}>📊 Prix estimé par CoteCars</p>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                      {[
                        { label:"Agressif", sub:"Vente rapide", val:a.stats?.pMin, color:"#F59E0B", bg:"#fffbeb", bd:"#fde68a" },
                        { label:"Marché",   sub:"Max contacts", val:a.stats?.p25,  color:EMERALD,   bg:"#eff4ff", bd:"#93c5fd" },
                        { label:"Haut",     sub:"Avec négo",    val:a.stats?.p50,  color:"#6366F1", bg:"#eef2ff", bd:"#c7d2fe" },
                      ].map((s,i) => (
                        <div key={i} style={{ background:s.bg, border:`1px solid ${s.bd}`, borderRadius:10, padding:"10px 6px", textAlign:"center" }}>
                          <p style={{ margin:"0 0 4px", fontSize:9, fontWeight:800, color:s.color, textTransform:"uppercase", letterSpacing:"0.06em" }}>{s.label}</p>
                          <p style={{ margin:"0 0 2px", fontSize:17, fontWeight:800, color:s.color }}>{Math.round(s.val||0).toLocaleString("fr-FR")}€</p>
                          <p style={{ margin:0, fontSize:10, color:"var(--text2)" }}>{s.sub}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Fiche technique */}
                <div style={{ background:"var(--card)", border:"0.5px solid var(--border)", borderRadius:14, overflow:"hidden" }}>
                  <div style={{ padding:"10px 16px", borderBottom:"0.5px solid var(--border)", background:"var(--bg3)" }}>
                    <p style={{ margin:0, fontSize:11, fontWeight:800, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.08em" }}>🔧 Fiche technique</p>
                  </div>
                  {[
                    { label:"Année",           val: a.annee },
                    { label:"Énergie",          val: a.energie },
                    { label:"Puissance DIN",    val: a.ch ? `${a.ch} ch` : null },
                    { label:"Boîte de vitesse", val: a.boite || (a.gearbox==="1"?"Manuelle":a.gearbox==="2"?"Automatique":"") },
                    { label:"Kilométrage",      val: a.km ? `${a.km?.toLocaleString("fr-FR")} km` : null },
                    { label:"Localisation",     val: a.localisation },
                  ].filter(r => r.val).map((r,i,arr) => (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"10px 16px", borderBottom: i < arr.length-1 ? "0.5px solid var(--border)" : "none" }}>

                      <span style={{ fontSize:13, fontWeight:600, color:"var(--text)" }}>{r.val}</span>

                  ))}

              </div>
            </div>

      );
    }

    // ─── PAGE ERREUR ──────────────────────────────────────────────
    function ErrorPage({ apiErr, plaque, onReset }) {
      const [nom, setNom] = React.useState("");
      const [tel, setTel] = React.useState("");
      const [email, setEmail] = React.useState("");
      const [marque, setMarque] = React.useState("");
      const [modele, setModele] = React.useState("");
      const [annee, setAnnee] = React.useState("");
      const [km, setKm] = React.useState("");
      const [submitted, setSubmitted] = React.useState(false);
      const [sending, setSending] = React.useState(false);

      const isValid = nom && (tel || email) && marque && annee;

      async function handleSubmit() {
        if (!isValid) return;
        setSending(true);
        try {
          await db.collection("signalements").add({
            plaque,
            nom,
            tel,
            email,
            marque,
            modele,
            annee,
            km,
            erreur: apiErr,
            createdAt: new Date().toISOString()
          });
          // Envoyer notification email
          fetch("/api/brevo-form-requests", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nom, tel, email, plaque, marque, modele, annee, km, erreur: apiErr })
          }).catch(()=>{});
          setSubmitted(true);
        } catch(e) {}
        setSending(false);
      }

      return (
        <div className="errorpage-root" style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px", paddingLeft: "calc(220px + 24px)" }}>
          <div style={{ position:"relative", marginBottom:16 }}>
            <div style={{ fontSize:64, animation:"bounce 1.5s infinite", display:"inline-block" }}>🚗</div>
            <div style={{ position:"absolute", top:-8, right:-8, fontSize:26, animation:"spin 2s linear infinite", display:"inline-block" }}>⚠️</div>
          </div>
          <style>{`
            @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
            @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
            @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
          `}</style>

          <h2 style={{ fontWeight:800, fontSize:22, color:"var(--text)", margin:"0 0 6px", textAlign:"center" }}>Véhicule introuvable</h2>
          <p style={{ color:"#6b7280", fontSize:13, margin:"0 0 10px", textAlign:"center" }}>{apiErr}</p>
          <div style={{ background:"#fef3c7", border:"1px solid #fde68a", borderRadius:12, padding:"8px 16px", marginBottom:16, textAlign:"center" }}>
            <p style={{ margin:0, fontSize:13, color:"#92400e" }}>🔍 Plaque analysée : <strong>{plaque}</strong></p>
          </div>

          {!submitted ? (
            <div style={{ width:"100%", background:"var(--card)", borderRadius:20, padding:"20px", boxShadow:"0 4px 16px rgba(0,0,0,0.08)", animation:"fadeIn 0.4s ease", border:"0.5px solid var(--border)" }}>
              <p style={{ fontWeight:800, fontSize:15, color:"#111", margin:"0 0 4px", textAlign:"center" }}>📬 On s&apos;occupe de vous !</p>
              <p style={{ color:"#6b7280", fontSize:12, margin:"0 0 14px", textAlign:"center" }}>Remplissez le formulaire et nous vous fournirons l&apos;estimation gratuitement.</p>

              <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Plaque d&apos;immatriculation</label>
              <input value={plaque} readOnly
                style={{ width:"100%", padding:"10px 12px", border:"2px solid #1a3fdb", borderRadius:10, fontSize:14, marginBottom:8, boxSizing:"border-box", outline:"none", fontWeight:700, color:"#111", background:"#eff4ff", letterSpacing:"2px" }} />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                <div>
                  <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Nom *</label>
                  <input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Jean Dupont"
                    style={{ width:"100%", padding:"10px 12px", border:"2px solid #e5e7eb", borderRadius:10, fontSize:13, boxSizing:"border-box", outline:"none" }} />
                </div>
                <div>
                  <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Téléphone</label>
                  <input value={tel} onChange={e=>setTel(e.target.value)} placeholder="0692 00 00 00" type="tel"
                    style={{ width:"100%", padding:"10px 12px", border:"2px solid #e5e7eb", borderRadius:10, fontSize:13, boxSizing:"border-box", outline:"none" }} />
                </div>
              </div>

              <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Email</label>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="jean@email.com" type="email"
                style={{ width:"100%", padding:"10px 12px", border:"2px solid #e5e7eb", borderRadius:10, fontSize:13, marginBottom:8, boxSizing:"border-box", outline:"none" }} />

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                <div>
                  <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Marque *</label>
                  <input value={marque} onChange={e=>setMarque(e.target.value)} placeholder="Ex: Renault"
                    style={{ width:"100%", padding:"10px 12px", border:"2px solid #e5e7eb", borderRadius:10, fontSize:13, boxSizing:"border-box", outline:"none" }} />
                </div>
                <div>
                  <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Modèle</label>
                  <input value={modele} onChange={e=>setModele(e.target.value)} placeholder="Ex: Clio"
                    style={{ width:"100%", padding:"10px 12px", border:"2px solid #e5e7eb", borderRadius:10, fontSize:13, boxSizing:"border-box", outline:"none" }} />
                </div>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
                <div>
                  <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Année *</label>
                  <input value={annee} onChange={e=>setAnnee(e.target.value)} placeholder="Ex: 2018" type="number" maxLength={4}
                    style={{ width:"100%", padding:"10px 12px", border:"2px solid #e5e7eb", borderRadius:10, fontSize:13, boxSizing:"border-box", outline:"none" }} />
                </div>
                <div>
                  <label style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textTransform:"uppercase", display:"block", marginBottom:3 }}>Kilométrage</label>
                  <input value={km} onChange={e=>setKm(e.target.value)} placeholder="Ex: 120000" type="number"
                    style={{ width:"100%", padding:"10px 12px", border:"2px solid #e5e7eb", borderRadius:10, fontSize:13, boxSizing:"border-box", outline:"none" }} />
                </div>
              </div>

              <button onClick={handleSubmit} disabled={!isValid||sending}
                style={{ width:"100%", background:!isValid?"#d1d5db":"linear-gradient(135deg,#1a3fdb,#0f28a8)", color:"white", fontWeight:800, fontSize:15, borderRadius:12, padding:"13px 0", border:"none", cursor:!isValid?"not-allowed":"pointer", marginBottom:8 }}>
                {sending ? "Envoi en cours..." : "📩 Envoyer ma demande"}
              </button>
              <button onClick={onReset} style={{ width:"100%", background:"#f3f4f6", color:"#6b7280", fontWeight:700, fontSize:13, borderRadius:12, padding:"11px 0", border:"none", cursor:"pointer" }}>

                🔄 Nouvelle recherche
              </button>

          )}

    }

    function App() {
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);

      React.useEffect(() => {
        const unsub = auth.onAuthStateChanged(async u => {
          setUser(u || null);
          if (u) {
            const token = await u.getIdTokenResult();
            setIsAdmin(!!token.claims.admin);
          } else {
            setIsAdmin(false);
          }
        });
        return unsub;
      }, []);

      const [state, setState] = useState("home");
      const [showAnnonces, setShowAnnonces] = React.useState(false);
      const [showPartenaireModal, setShowPartenaireModal] = React.useState(false);
      const [showCreateAnnonce, setShowCreateAnnonce] = React.useState(false);
      const [showPrepareLbc, setShowPrepareLbc] = React.useState(false);
      const [showMobileMenu, setShowMobileMenu] = React.useState(false);
      const [gearbox, setGearbox] = useState("");
      const [showPuissanceConfirm, setShowPuissanceConfirm] = React.useState(false);
      const [puissanceConfirmValue, setPuissanceConfirmValue] = React.useState("");
      const [pendingResult, setPendingResult] = React.useState(null);
      const [showEnergieConfirm, setShowEnergieConfirm] = React.useState(false);
      const [plate, setPlate] = useState("");
      const [km, setKm] = useState("");
      const [finition, setFinition] = useState("");
      const [finitionsList, setFinitionsList] = useState([]);
      const [vehicleInfo, setVehicleInfo] = useState(null);
      const [loadingFin, setLoadingFin] = useState(false);
      const [finLoaded, setFinLoaded] = useState(false);
      const [err, setErr] = useState("");
      const [apiErr, setApiErr] = useState("");
      const [result, setResult] = useState(null);
      const [historique, setHistorique] = useState([]);

      // Charger historique depuis Firestore
      React.useEffect(() => {
        if (!user) return;
        db.collection("historique").doc(user?.uid).get().then(doc => {
          if (doc.exists) setHistorique(doc.data().items || []);
        }).catch(() => {});
      }, [user]);

      function handlePlateChange(val) {
        setPlate(val);
        setFinition("");
        setFinitionsList([]);
        setVehicleInfo(null);
        setFinLoaded(false);
        // Longueur sans tirets pour déclencher le chargement
        const valClean = val.replace(/-/g, "");
        if (valClean.length >= 7) {
          setTimeout(() => loadFinitions(val), 100);
        }
      }

      async function loadFinitions(p) {
        if (!p || p.length < 7) return;
        setLoadingFin(true);
        try {
          const pClean = p.replace(/-/g, "");
          const sivRes = await fetch(`/api/rapid-api-requests?plaque=${pClean}`);
          if (!sivRes.ok) return;
          const sivData = await sivRes.json();
          const veh = sivData.data || sivData.données || {};
          const marque = veh.AWN_marque || "";
          const modeleRaw = (veh.AWN_nom_commercial || veh.AWN_modele || "").replace(/_/g, " ");
          const fins = getFinitions(marque, modeleRaw);
          setFinitionsList(fins);
          setVehicleInfo({ marque, modele: modeleRaw });
          setFinition("");
        } catch(e) {}
        setFinLoaded(true);
        setLoadingFin(false);
      }


      async function handleAnalyze() {
        if (plate.length < 7) { setErr("Veuillez saisir une plaque valide (ex: AB-123-CD)"); return; }
        if (!gearbox) { setErr("Veuillez sélectionner le type de boîte de vitesse."); return; }
        setErr(""); setState("loading"); if(window.posthog) posthog.capture('recherche_lancee', {plaque, km, gearbox, finition});
        try {
          const plateClean = plate.replace(/-/g, "");
          const sivRes = await fetch(`/api/rapid-api-requests?plaque=${plateClean}`);
          if (!sivRes.ok) throw new Error(`Plaque introuvable (${sivRes.status})`);
          const sivData = await sivRes.json();
          const veh = sivData.data || sivData.données || {};
          const marque = veh.AWN_marque || "";
          const modele = (veh.AWN_nom_commercial || veh.AWN_modele || "").replace(/_/g, " ");
          const nom = [marque, veh.AWN_modele, veh.AWN_date_mise_en_circulation?.slice(6)].filter(Boolean).join(" ");
          if (!marque || !modele) throw new Error("Véhicule non identifié.");

          const kmUser = km ? parseInt(km) : null;
          const anneeUser = veh.AWN_date_mise_en_circulation ? parseInt(veh.AWN_date_mise_en_circulation.slice(-4)) : null;
          const chUser = veh.AWN_puissance_CH || null;
          const energieRaw = veh.AWN_energie || "";
          const FUEL_CODES = {
            "ESSENCE": "1",
            "GAZOLE": "2",
            "GPL": "3",
            "ELECTRIQUE": "4",
            "AUTRE": "5",
            "HYBRIDE": "6",
            "HYBRIDE ESSENCE ELECTRIQUE": "6",
            "HYBRIDE RECHARGEABLE": "6",
            "HYBRIDE DIESEL ELECTRIQUE": "6",
            "GAZ NATUREL (GNV)": "5",
            "HYDROGENE": "5",
          };
          const fuelCode = FUEL_CODES[energieRaw.toUpperCase()] || (energieRaw.includes("HYBRIDE") ? "6" : energieRaw.includes("ELECTR") ? "4" : energieRaw.includes("GPL") ? "3" : "");

          const lbcParams = new URLSearchParams({ marque, modele });
          if (kmUser)    lbcParams.set("km", kmUser);
          if (anneeUser) lbcParams.set("annee", anneeUser);
          if (chUser)    lbcParams.set("ch", chUser);
          if (fuelCode)  lbcParams.set("fuel", fuelCode);
          lbcParams.set("gearbox", gearbox);
          if (finition) lbcParams.set("finition", finition);
          const lbcRes = await fetch(`/api/leboncoin?${lbcParams.toString()}`);
          if (!lbcRes.ok) throw new Error(`Erreur marché (${lbcRes.status})`);
          const lbcData = await lbcRes.json();
          const rawAds = lbcData.ads || [];
          const ads = filterAds(rawAds, kmUser, anneeUser, chUser, marque, modele, finition);
          const stats = computeStats(ads);
          const peuResultats = finition && ads.length < 5;

          const finitionsList2 = getFinitions(marque, modele);
          // Sauvegarder dans Firestore
          const entry = { plate, nom, finition, stats, date: new Date().toLocaleDateString('fr-FR'), km: kmUser };
          const newHisto = [entry, ...historique.filter(h => h.plate !== plate)].slice(0, 10);
          setHistorique(newHisto);
          if (user) {
            db.collection("historique").doc(user?.uid).set({ items: newHisto }).catch(() => {});
          }

          let resultData = { veh, nom, ads, stats, finition, peuResultats, marque, modele, kmUser, anneeUser, chUser, fuelCode, gearbox, finitionsList: finitionsList2 };
          if (veh.AWN_energie_SUSPECT) {
            setPendingResult(resultData);
            setShowEnergieConfirm(true);
            setState("home");
          } else if (veh.AWN_puissance_SUSPECT) {
            setPendingResult(resultData);
            setPuissanceConfirmValue("");
            setShowPuissanceConfirm(true);
            setState("home");
          } else {
            setResult(resultData);
            setState("results");
          } if(window.posthog) posthog.capture('vehicule_identifie', {marque, modele, finition, km: kmUser});
        } catch(e) {
          setApiErr(e.message || "Une erreur est survenue.");
          setState("error"); if(window.posthog) posthog.capture('recherche_erreur', {plaque, erreur: e.message});
        }
      }

      async function handleElargi(finitionSimilaire) {
        // Relancer avec finition similaire ou sans finition
        setState("loading");
        try {
          const veh = result.veh;
          const marque = result.marque;
          const modele = result.modele;
          const nom = result.nom;
          const lbcParams = new URLSearchParams({ marque, modele });
          if (result.kmUser)    lbcParams.set("km", result.kmUser);
          if (result.anneeUser) lbcParams.set("annee", result.anneeUser);
          if (result.chUser)    lbcParams.set("ch", result.chUser);
          if (result.fuelCode)  lbcParams.set("fuel", result.fuelCode);
          if (result.gearbox) lbcParams.set("gearbox", result.gearbox);
          const lbcRes = await fetch(`/api/leboncoin?${lbcParams.toString()}`);
          if (!lbcRes.ok) throw new Error("Erreur marché");
          const lbcData = await lbcRes.json();
          const rawAds = lbcData.ads || [];
          const kmUser = result.kmUser;
          const anneeUser = result.anneeUser;
          const chUser = result.chUser;
          const ads = filterAds(rawAds, kmUser, anneeUser, chUser, marque, modele, finition);
          const stats = computeStats(ads);
          setResult({ ...result, ads, stats, finition: finitionSimilaire || "", peuResultats: false });
          setState("results");
        } catch(e) {
          setApiErr(e.message);
          setState("error");
        }
      }

      function handleReset() {
        setState("home"); setPlate(""); setKm(""); setGearbox("");
        setFinition(""); setFinitionsList([]); setVehicleInfo(null); setFinLoaded(false);
        setErr(""); setApiErr(""); setResult(null);

                    <path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
                    <path d="M5 17h-2v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2m-4 0h-6m-6-6h15m-6 0v-5"/>

                  <svg width="15" height="15" fill="none" stroke="#1B3FDB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

                  <span style={{ fontSize:13, fontWeight:500, color:"var(--text2)" }}>Nos annonces</span>
                </button>

                  <svg width="15" height="15" fill="none" stroke="#f59e0b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
