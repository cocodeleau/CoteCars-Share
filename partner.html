    // ── Fond AutoEasy — image réelle générée par IA ──────────────
    const AE_BG_IMG = new Image();
    AE_BG_IMG.src = "/autoeasy-bg.jpg";

    function drawBackground(canvas) {
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;

      if (bgLoaded) {
        // Utiliser l'image réelle comme fond
        ctx.drawImage(AE_BG_IMG, 0, 0, w, h);
      } else {
        // Fallback si image pas encore chargée
        ctx.fillStyle = "#2a3142";
        ctx.fillRect(0, 0, w, h);
      }
    }

    // ── Fonction principale de traitement image ───────────────────
    // remove.bg appelé directement depuis le frontend (pas de limite 413)
    const REMOVE_BG_KEY = "d4MqSKLfmAwY3zgsTiiEFVbe";

    async function removeBgDirect(file) {
      const fd = new FormData();
      fd.append("image_file", file);
      fd.append("size", "auto");
      fd.append("type", "car");

      const res = await fetch("https://api.remove.bg/v1.0/removebg", {
        method: "POST",
        headers: { "X-Api-Key": REMOVE_BG_KEY },
        body: fd,
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error("remove.bg: " + err);
      }

      const blob = await res.blob();
      return URL.createObjectURL(blob); // PNG transparent
    }

    async function analyzeWithGemini(file) {
      const base64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result.split(",")[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });

      const apiRes = await fetch("/api/partner-image", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          imageBase64: base64.slice(0, 800000),
          mimeType: file.type || "image/jpeg"
        }),
      });

      if (!apiRes.ok) return { plateBox: null, carPlacement: null };
      const data = await apiRes.json();
      return {
        plateBox: data.plateBox || null,
        carPlacement: data.carPlacement || null,
      };
    }

    async function processPartnerImage(file, onProgress) {
      return new Promise(async (resolve, reject) => {
        try {
          onProgress("Suppression du fond...", 15);

          // 1. remove.bg directement depuis le frontend
          let carImgSrc;
          try {
            carImgSrc = await removeBgDirect(file);
          } catch(e) {
            console.warn("remove.bg échoué, utilisation original:", e);
            carImgSrc = URL.createObjectURL(file);
          }

          onProgress("Chargement de la voiture découpée...", 40);

          // 2. Charger le PNG transparent
          const carImg = new Image();
          await new Promise((res, rej) => {
            carImg.onload = res;
            carImg.onerror = rej;
            carImg.src = carImgSrc;
          });

          onProgress("Analyse Gemini (plaque + positionnement)...", 55);

          // 3. Gemini analyse la photo : plaque + position optimale dans le fond
          let plateBox = null;
          let carPlacement = null;
          try {
            const result = await analyzeWithGemini(file);
            plateBox = result.plateBox;
            carPlacement = result.carPlacement;
          } catch(e) {
            console.warn("Gemini analyse échoué:", e);
          }

          onProgress("Composition du fond AutoEasy...", 70);

          // Attendre que l'image de fond soit chargée
          if (!bgLoaded) {
            await new Promise((res) => {
              if (bgLoaded) { res(); return; }
              AE_BG_IMG.onload = () => { bgLoaded = true; res(); };
              setTimeout(res, 3000); // timeout 3s
            });
          }

          // 4. Canvas 1024x768
          const canvas = document.createElement("canvas");
          canvas.width = 1024;
          canvas.height = 768;
          const ctx = canvas.getContext("2d");

          // 5. Fond AutoEasy
          drawBackground(canvas);

          // 6. Positionner la voiture sur le fond showroom
          // Sol mesuré précisément sur autoeasy-bg.jpg : y=490px sur canvas 768px
          const SOL_PX = 490;
          const carW = 800;

          // Détecter le bas réel des roues dans le PNG transparent
          // remove.bg laisse souvent du padding transparent en bas
          const tmpCanvas = document.createElement("canvas");
          tmpCanvas.width = carImg.width;
          tmpCanvas.height = carImg.height;
          const tmpCtx = tmpCanvas.getContext("2d");
          tmpCtx.drawImage(carImg, 0, 0);
          const imgData = tmpCtx.getImageData(0, 0, carImg.width, carImg.height);
          const pixels = imgData.data;

          // Trouver la dernière ligne avec des pixels non-transparents
          let lastVisibleRow = 0;
          for (let y = carImg.height - 1; y >= 0; y--) {
            let hasPixel = false;
            for (let x = 0; x < carImg.width; x++) {
              const alpha = pixels[(y * carImg.width + x) * 4 + 3];
              if (alpha > 30) { hasPixel = true; break; }
            }
            if (hasPixel) { lastVisibleRow = y; break; }
          }

          // Trouver la première ligne avec des pixels non-transparents (haut)
          let firstVisibleRow = 0;
          for (let y = 0; y < carImg.height; y++) {
            let hasPixel = false;
            for (let x = 0; x < carImg.width; x++) {
              const alpha = pixels[(y * carImg.width + x) * 4 + 3];
              if (alpha > 30) { hasPixel = true; break; }
            }
            if (hasPixel) { firstVisibleRow = y; break; }
          }

          // Hauteur réelle de la voiture (sans padding transparent)
          const visibleHeight = lastVisibleRow - firstVisibleRow;
          const scaleRatio = carW / carImg.width;
          const carH = visibleHeight * scaleRatio;
          const carX = (1024 - carW) / 2 + 20;
          // On positionne en tenant compte du padding haut
          const carY = SOL_PX - carH - (firstVisibleRow * scaleRatio);

          // Ombre portée elliptique juste sous les roues
          ctx.save();
          ctx.globalAlpha = 0.60;
          ctx.filter = "blur(20px)";
          ctx.fillStyle = "#000000";
          ctx.beginPath();
          ctx.ellipse(
            carX + carW * 0.48,
            SOL_PX + 4,
            carW * 0.36,
            12,
            0, 0, Math.PI * 2
          );
          ctx.fill();
          ctx.restore();

          // Reflet sur sol brillant
          ctx.save();
          ctx.globalAlpha = 0.12;
          ctx.filter = "blur(5px)";
          ctx.translate(carX + carW / 2, SOL_PX);
          ctx.scale(1, -0.15);
          ctx.translate(-(carX + carW / 2), -SOL_PX);
          ctx.drawImage(carImg, carX, carY, carW, carImg.height * (carW / carImg.width));
          ctx.restore();

          // Voiture découpée
          ctx.drawImage(carImg, carX, carY, carW, carH);

          onProgress("Cache de la plaque...", 85);

          // 7. Cache plaque AUTOEASY
          const drawPlateCache = (px, py, pw, ph) => {
            ctx.fillStyle = "#1a1a2e";
            ctx.beginPath();
            ctx.roundRect(px - 5, py - 3, pw + 10, ph + 8, 4);
            ctx.fill();
            ctx.fillStyle = "white";
            const fs = Math.max(10, Math.min(ph * 0.6, 20));
            ctx.font = `bold ${fs}px DM Sans, Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("AUTOEASY", px + pw / 2, py + ph / 2 + 2);
            ctx.textAlign = "left";
            ctx.textBaseline = "alphabetic";
            ctx.fillStyle = "#8dc63f";
            ctx.fillRect(px - 5, py + ph + 5, pw + 10, 2);
          };

          if (plateBox) {
            // Coordonnées Gemini relatives à l'image originale
            // On les mappe sur la zone voiture dans le canvas
            const px = carX + plateBox.x * carW;
            const py = carY + plateBox.y * carH;
            const pw = Math.max(plateBox.w * carW, 55);
            const ph = Math.max(plateBox.h * carH, 16);
            drawPlateCache(px, py, pw, ph);
          } else {
            // Fallback : plaque avant bas-centre de la voiture
            drawPlateCache(
              carX + carW * 0.30,
              carY + carH * 0.83,
              carW * 0.14,
              carH * 0.05
            );
          }

          onProgress("Export JPG 1024×768...", 95);

          // 8. Export
          const dataUrl = canvas.toDataURL("image/jpeg", 0.93);
          onProgress("Terminé !", 100);

          // Libérer object URL
          URL.revokeObjectURL(carImgSrc);

          resolve({ dataUrl });

        } catch (err) {
          reject(err);
        }
      });
    }

    // ── Dashboard ─────────────────────────────────────────────────
    function Dashboard({ user, onNewSession }) {
      const [sessions, setSessions] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        db.collection("partner_sessions")
          .where("uid", "==", user.uid)
          .orderBy("createdAt", "desc")
          .limit(20)
          .get()
          .then(snap => {
            setSessions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, []);

      const totalPhotos = sessions.reduce((s, sess) => s + (sess.photoCount || 0), 0);

      async function downloadSession(sess) {
        if (!sess.photos?.length) return;
        // Télécharger chaque photo
        for (let i = 0; i < sess.photos.length; i++) {
          const url = sess.photos[i];
          const a = document.createElement("a");
          a.href = url;
          a.download = `${sess.vehicleName?.replace(/\s/g,"_") || "vehicule"}_photo_${i+1}.jpg`;
          a.target = "_blank";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          await new Promise(r => setTimeout(r, 400));
        }
      }

      return (

                <div style={{ padding:40, textAlign:"center" }}>
                  <div className="spinner" style={{ margin:"0 auto" }} />
                </div>
              )}

              {!loading && sessions.length === 0 && (
                <div style={{ padding:"60px 20px", textAlign:"center" }}>
                  <div style={{ fontSize:40, marginBottom:12 }}>📷</div>
                  <div style={{ fontSize:15, fontWeight:600, color:"#374151", marginBottom:6 }}>Aucune session</div>
                  <div style={{ fontSize:13, color:"#9ca3af", marginBottom:20 }}>Commencez votre premier traitement photo.</div>
                  <button onClick={onNewSession} className="btn-ae" style={{ padding:"10px 20px", fontSize:13 }}>
                    + Nouveau traitement
                  </button>
                </div>
              )}

              {!loading && sessions.length > 0 && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:12, padding:16 }}>
                  {sessions.map(sess => (
                    <div key={sess.id} className="photo-card" style={{ border:"0.5px solid #e2e8f0", borderRadius:10, overflow:"hidden", background:"#fafafa" }}>
                      <div style={{ height:120, background:"#1a1a2e", overflow:"hidden", position:"relative" }}>
                        {sess.photos?.[0] ? (
                          <img src={sess.photos[0]} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                        ) : (
                          <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30 }}>🚗</div>
                        )}
                        <div style={{ position:"absolute", bottom:0, left:0, right:0, height:18, background:"#1a1a2e", display:"flex", alignItems:"center", justifyContent:"center" }}>
                          <span style={{ fontSize:9, fontWeight:800, color:"white", letterSpacing:"0.08em" }}>AUTOEASY</span>
                        </div>
                      </div>
                      <div style={{ padding:"10px 12px" }}>
                        <div style={{ fontSize:12, fontWeight:700, color:"#111", marginBottom:2 }}>{sess.vehicleName || "Véhicule"}</div>
                        <div style={{ fontSize:10, color:"#9ca3af", marginBottom:8 }}>
                          {sess.photoCount} photo{sess.photoCount>1?"s":""} · {new Date(sess.createdAt).toLocaleDateString("fr-FR")}
                        </div>
                        <button onClick={() => downloadSession(sess)} className="btn-ae" style={{ width:"100%", padding:"6px", fontSize:10 }}>
                          Télécharger ({sess.photoCount} JPG)
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Studio Photo ──────────────────────────────────────────────
    function Studio({ user, onBack }) {
      const [step, setStep] = useState(1); // 1=upload, 2=processing, 3=export
      const [files, setFiles] = useState([]);
      const [vehicleName, setVehicleName] = useState("");
      const [processed, setProcessed] = useState([]); // [{dataUrl, file}]
      const [progress, setProgress] = useState({ msg:"", pct:0 });
      const [currentIdx, setCurrentIdx] = useState(0);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const fileInputRef = useRef();

      function handleFiles(e) {
        const newFiles = Array.from(e.target.files).slice(0, 5 - files.length);
        setFiles(prev => [...prev, ...newFiles].slice(0, 5));
      }

      function removeFile(i) {
        setFiles(prev => prev.filter((_, idx) => idx !== i));
      }

      async function handleProcess() {
        if (!files.length) return;
        setStep(2);
        const results = [];

        for (let i = 0; i < files.length; i++) {
          setCurrentIdx(i);
          setProgress({ msg: `Photo ${i+1}/${files.length} — démarrage...`, pct: 0 });

          try {
            const result = await processPartnerImage(
              files[i],
              (msg, pct) => setProgress({ msg: `Photo ${i+1}/${files.length} — ${msg}`, pct })
            );
            results.push({ dataUrl: result.dataUrl, file: files[i] });
          } catch(err) {
            console.error("Erreur photo", i, err);
            results.push(null);
          }
        }

        setProcessed(results.filter(Boolean));
        setStep(3);
      }

      async function handleSave() {
        setSaving(true);
        try {
          const photoUrls = await Promise.all(processed.map(async (p, i) => {
            // Convertir dataUrl en blob
            const res = await fetch(p.dataUrl);
            const blob = await res.blob();
            const ref = storage.ref(`partner_photos/${user.uid}/${Date.now()}_${i}.jpg`);
            await ref.put(blob, { contentType: "image/jpeg" });
            return ref.getDownloadURL();
          }));

          await db.collection("partner_sessions").add({
            uid: user.uid,
            userEmail: user.email,
            vehicleName: vehicleName || "Véhicule",
            photoCount: photoUrls.length,
            photos: photoUrls,
            createdAt: new Date().toISOString(),
          });

          setSaved(true);
        } catch(err) {
          alert("Erreur sauvegarde : " + err.message);
        }
        setSaving(false);
      }

      function downloadAll() {
        processed.forEach((p, i) => {
          const a = document.createElement("a");
          a.href = p.dataUrl;
          a.download = `${vehicleName?.replace(/\s/g,"_") || "vehicule"}_photo_${i+1}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        });
      }

      return (
        <div style={{ minHeight:"100vh", background:"#f5f5f7", fontFamily:"'DM Sans',-apple-system,sans-serif" }}>
          {/* Navbar */}
          <div style={{ background:"#1a1a2e", borderBottom:"2px solid #8dc63f", padding:"0 28px", height:52, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
              <div style={{ width:28, height:28, borderRadius:7, background:"#8dc63f", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:11, fontWeight:900, color:"#1a1a2e" }}>AE</span>
              </div>
              <span style={{ fontSize:14, fontWeight:700, color:"white" }}>AutoEasy Studio</span>
              <span style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>/ Nouveau traitement</span>
            </div>
            <button onClick={onBack} className="btn-outline" style={{ padding:"5px 14px", fontSize:12 }}>
              ← Dashboard
            </button>
          </div>

          <div style={{ padding:"24px 28px", maxWidth:1000, margin:"0 auto" }}>

            {/* Steps */}
            <div style={{ background:"white", borderRadius:12, border:"0.5px solid #e2e8f0", padding:"14px 20px", marginBottom:20, display:"flex", alignItems:"center", gap:0 }}>
              {[
                { n:1, label:"Upload photos" },
                { n:2, label:"Traitement IA" },
                { n:3, label:"Export" },
              ].map((s, i) => (
                <React.Fragment key={s.n}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:26, height:26, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, flexShrink:0,
                      background: step > s.n ? "#8dc63f" : "transparent",
                      border: step === s.n ? "2px solid #8dc63f" : step > s.n ? "none" : "2px solid #e2e8f0",
                      color: step > s.n ? "#1a1a2e" : step === s.n ? "#8dc63f" : "#9ca3af"
                    }}>
                      {step > s.n ? "✓" : s.n}
                    </div>
                    <span style={{ fontSize:12, fontWeight: step === s.n ? 700 : 400, color: step === s.n ? "#111" : "#9ca3af" }}>{s.label}</span>
                  </div>
                  {i < 2 && <div style={{ flex:1, height:1, background: step > s.n ? "#8dc63f" : "#e2e8f0", margin:"0 12px" }} />}
                </React.Fragment>
              ))}
            </div>

            {/* ─── ÉTAPE 1 : Upload ─── */}
            {step === 1 && (
              <div className="fade-in" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                <div style={{ background:"white", borderRadius:12, border:"0.5px solid #e2e8f0", padding:18 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#374151", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:14 }}>
                    Informations véhicule
                  </div>
                  <label style={{ fontSize:11, color:"#9ca3af", textTransform:"uppercase", letterSpacing:"0.07em", display:"block", marginBottom:6 }}>Nom du véhicule</label>
                  <input type="text" value={vehicleName} onChange={e=>setVehicleName(e.target.value)} placeholder="Ex: Renault Clio 2018"
                    style={{ width:"100%", padding:"11px 14px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:14, outline:"none", marginBottom:16, color:"#111" }} />

                  <div style={{ fontSize:12, fontWeight:700, color:"#374151", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:10 }}>
                    Photos ({files.length}/5)
                  </div>

                  <label style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", border:"2px dashed #e2e8f0", borderRadius:12, padding:"24px 16px", cursor:"pointer", background:"#fafafa", marginBottom:12 }}
                    onDragOver={e => { e.preventDefault(); }}
                    onDrop={e => { e.preventDefault(); const f = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("image/")); setFiles(prev=>[...prev,...f].slice(0,5)); }}>
                    <span style={{ fontSize:28, marginBottom:8 }}>📸</span>
                    <span style={{ fontSize:13, fontWeight:600, color:"#374151" }}>Glissez ou cliquez pour ajouter</span>
                    <span style={{ fontSize:11, color:"#9ca3af", marginTop:4 }}>JPG, PNG · Max 5 photos</span>
                    <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={handleFiles} style={{ display:"none" }} />
                  </label>

                  {files.length > 0 && (
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:14 }}>
                      {files.map((f, i) => (
                        <div key={i} style={{ position:"relative" }}>
                          <img src={URL.createObjectURL(f)} alt="" style={{ width:"100%", aspectRatio:"4/3", objectFit:"cover", borderRadius:8, border:"0.5px solid #e2e8f0" }} />
                          <button onClick={() => removeFile(i)}
                            style={{ position:"absolute", top:3, right:3, width:18, height:18, borderRadius:"50%", background:"rgba(0,0,0,0.6)", color:"white", border:"none", cursor:"pointer", fontSize:10, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                          <div style={{ position:"absolute", bottom:3, left:3, background:"rgba(0,0,0,0.5)", color:"white", fontSize:8, padding:"1px 5px", borderRadius:3 }}>Photo {i+1}</div>
                        </div>
                      ))}
                    </div>
                  )}

                  <button onClick={handleProcess} disabled={files.length === 0} className="btn-ae"
                    style={{ width:"100%", padding:"13px", fontSize:14 }}>
                    Traiter avec Gemini AI ({files.length} photo{files.length>1?"s":""})
                  </button>
                </div>

                <div style={{ background:"white", borderRadius:12, border:"0.5px solid #e2e8f0", padding:18 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#374151", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:14 }}>
                    Ce qui sera fait
                  </div>
                  {[
                    { icon:"🔍", title:"Détection plaque", desc:"Gemini Vision localise la plaque d'immatriculation sur chaque photo." },
                    { icon:"⬛", title:"Cache AUTOEASY", desc:"Canvas HTML5 recouvre la plaque avec une bannière noire AUTOEASY." },
                    { icon:"🏙️", title:"Fond AutoEasy", desc:"Fond standardisé : sol damier noir/vert + panneau AutoEasy." },
                    { icon:"📤", title:"Export JPG 1024×768", desc:"Format optimisé pour Leboncoin et le site AutoEasy." },
                  ].map((item, i) => (
                    <div key={i} style={{ display:"flex", gap:12, marginBottom:16, alignItems:"flex-start" }}>
                      <div style={{ width:36, height:36, borderRadius:8, background:"#f5f5f7", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{item.icon}</div>
                      <div>
                        <div style={{ fontSize:13, fontWeight:600, color:"#111", marginBottom:2 }}>{item.title}</div>
                        <div style={{ fontSize:12, color:"#6b7280", lineHeight:1.5 }}>{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ─── ÉTAPE 2 : Processing ─── */}
            {step === 2 && (
              <div className="fade-in" style={{ background:"white", borderRadius:12, border:"0.5px solid #e2e8f0", padding:"48px 32px", textAlign:"center" }}>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:20 }}>
                  <div className="spinner" style={{ width:52, height:52, borderWidth:4 }} />
                  <div style={{ fontSize:18, fontWeight:700, color:"#111" }}>Traitement en cours</div>
                  <div style={{ fontSize:13, color:"#6b7280" }}>{progress.msg}</div>

                  <div style={{ width:320 }}>
                    <div style={{ background:"#f3f4f6", borderRadius:99, overflow:"hidden", height:8, marginBottom:8 }}>
                      <div style={{ height:"100%", background:"#8dc63f", borderRadius:99, width:`${progress.pct}%`, transition:"width 0.3s" }} />
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#9ca3af" }}>
                      <span>Photo {currentIdx+1}/{files.length}</span>
                      <span>{progress.pct}%</span>
                    </div>
                  </div>

                  <div style={{ display:"grid", gridTemplateColumns:`repeat(${files.length},1fr)`, gap:8, marginTop:8 }}>
                    {files.map((f, i) => (
                      <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                        <div style={{ width:60, height:44, borderRadius:6, overflow:"hidden", border: i < currentIdx ? "2px solid #8dc63f" : i === currentIdx ? "2px solid #f59e0b" : "1px solid #e2e8f0", opacity: i > currentIdx ? 0.4 : 1 }}>
                          <img src={URL.createObjectURL(f)} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                        </div>
                        <div style={{ fontSize:9, color: i < currentIdx ? "#8dc63f" : i === currentIdx ? "#f59e0b" : "#9ca3af", fontWeight:600 }}>
                          {i < currentIdx ? "✓ OK" : i === currentIdx ? "⏳ En cours" : "En attente"}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ─── ÉTAPE 3 : Export ─── */}
            {step === 3 && (
              <div className="fade-in">
                <div style={{ background:"#f0fdf4", border:"1px solid #86efac", borderRadius:12, padding:"16px 20px", marginBottom:16, display:"flex", alignItems:"center", gap:12 }}>
                  <span style={{ fontSize:24 }}>✅</span>
                  <div>
                    <div style={{ fontSize:14, fontWeight:700, color:"#166534" }}>{processed.length} photo{processed.length>1?"s":""} traitée{processed.length>1?"s":""} avec succès !</div>
                    <div style={{ fontSize:12, color:"#15803d" }}>Format JPG 1024×768 — prêt pour Leboncoin</div>
                  </div>
                  <div style={{ marginLeft:"auto", display:"flex", gap:10 }}>
                    <button onClick={downloadAll} className="btn-ae" style={{ padding:"9px 18px", fontSize:13 }}>
                      Télécharger tout ({processed.length} JPG)
                    </button>
                    {!saved && (
                      <button onClick={handleSave} disabled={saving} className="btn-outline" style={{ padding:"9px 18px", fontSize:13 }}>
                        {saving ? "Sauvegarde..." : "💾 Sauvegarder dans l'historique"}
                      </button>
                    )}
                    {saved && <div style={{ padding:"9px 14px", fontSize:12, color:"#8dc63f", fontWeight:600 }}>✓ Sauvegardé</div>}
                  </div>
                </div>

                <div style={{ background:"white", borderRadius:12, border:"0.5px solid #e2e8f0", overflow:"hidden" }}>
                  <div style={{ padding:"12px 18px", borderBottom:"0.5px solid #e2e8f0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ fontSize:12, fontWeight:700, color:"#374151", textTransform:"uppercase", letterSpacing:"0.07em" }}>Photos traitées — 1024×768 JPG</span>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:`repeat(${Math.min(processed.length, 3)},1fr)`, gap:12, padding:16 }}>
                    {processed.map((p, i) => (
                      <div key={i} style={{ display:"flex", flexDirection:"column", gap:8 }}>
                        <img src={p.dataUrl} alt="" style={{ width:"100%", borderRadius:8, border:"0.5px solid #e2e8f0" }} />
                        <button onClick={() => {
                          const a = document.createElement("a");
                          a.href = p.dataUrl;
                          a.download = `${vehicleName?.replace(/\s/g,"_")||"vehicule"}_photo_${i+1}.jpg`;
                          a.click();
                        }} className="btn-outline" style={{ width:"100%", padding:"7px", fontSize:11 }}>
                          📥 photo_{i+1}.jpg
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── App principale ────────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState("dashboard"); // dashboard | studio

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
          if (u && ALLOWED_EMAILS.includes(u.email?.toLowerCase())) {
            setUser(u);
          } else if (u) {
            auth.signOut();
            setUser(null);
          } else {
            setUser(null);
          }
          setLoading(false);
        });
        return unsub;
      }, []);

      if (loading) return (
        <div style={{ minHeight:"100vh", background:"#1a1a2e", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
          <div style={{ width:44, height:44, borderRadius:10, background:"#8dc63f", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <span style={{ fontSize:18, fontWeight:900, color:"#1a1a2e" }}>AE</span>
          </div>
          <div className="spinner" />
        </div>
      );

      if (!user) return <LoginPage />;

      if (view === "studio") return <Studio user={user} onBack={() => setView("dashboard")} />;

      return <Dashboard user={user} onNewSession={() => setView("studio")} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
